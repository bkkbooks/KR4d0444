body:
  text: 松鄉集别集類四元提要臣等謹案松鄉集十卷元任士林撰士林字叔實號松鄉奉化人以郝天挺薦授安定書院山長是集所録碑志居多大抵刻意摹韓愈而其力不足以敵愈故句格往往拗澀乃流為劉蛻孫樵之體又間雜偶句為例不純其自然道士傳正一先生傳夀光先生傳諸篇襲毛頴傳而為之亦頗嫌窠臼然南宋季年文章凋敝道學一派以冗沓為詳明江湖一派以纎佻為雅雋先民舊法幾於蕩析無遺士林承極壞之後毅然欲追步於唐人雖明而未融要亦有振衰起廢之功所宜過而存之者也趙孟俯嘗見其蘭芎山寺碑文深相傾挹後士林卒孟俯為志其墓杜夲亦稱其謝翺傳胡烈婦傳能使秉彛好德之心千載著明固非曲相假借矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:31054e94cd3a6e735c89f06ccee6e2ec9fe0d32e2fc69a5adcbacc41c5025a09
