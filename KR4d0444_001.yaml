body:
  text: 松鄉集卷一元任士林撰徽州路重修學記皇帝臨御之初詔天下崇廟學徽為郡介在江南山川阻修實維文公其生也鄉其服也采式閭而鄒魯存家至而淵騫集庠序之政宜飭具舉然而棟宇闕漏祀肄弗共涂軌侵墉臧𨽻充宇有司祗曠弗構固壅德音而貽愧先哲也大德七年夏四月郡博士束從周始舍菜告至顧瞻惕然懼弛祀肄石㑹版入八百為儲士曰不足於養矧能餘吏曰不足於需矧能圗從周曰撙削有倡人將來趨於是擇時日庀工傭斬技幹運陶甓王宫正室葺而新之丹刻有燁重席仍几衮冕以嚴公配東坐哲祀攸序下逮羣弟諸儒佩舄簋簠籩豆考禮合宜門廡㦸衛講肄之位藏書之室景先之祠以至廩積出內之共鼎鑊炊􅐪之具罔不飭備鑿池思樂被以芹藻植蓮其中面池西南師燕有阼峙左屏阜夾右練溪是祠文公乃有别築於是廟學之制為始崇矣乃相與言曰廟學有政有舉無弛束博士之功也博士曰政以郡舉教由師作侯郝公之力也夫從周惡賢乃狀其事求文於余余惟聖人之教昭在庠序夫子之道著在人心不以言語文字而獨存不以禮樂刑政而偏舉忠恕之道天地流行修齊之功國家終始是故言政則教舉言教則政立夫子之道在是矣文公之學在是矣可不務乎於是乎記奉化州新修學記奉化唐開元中析鄞所置縣也今升為州學宫政化之本是宜廣多士而新之有司固未暇也大德三年秋七月肅政亷訪副使髙公伯元始易今扁明年夏六月僉事王公煥行郡諸生相與謁事畢坐彛訓堂上舉凡學之事廢宜興圮宜修唯所畫知州事王侯圭唯而退明日學正趙與權録趙進德以僉事公之命請於王侯圭侯曰諾環宫之墻百堵皆作大二百有竒廣仞之半髙如廣之度而三之雄固傑立覆飾如飛殿堂門廡之壯棟桷之撓折者易治之瓦蓋磚級之陊剝者丹白之漫漶不鮮者明飭咸理自夫子像以至四公十哲羣弟諸儒冠冕之飾衣裳之采與夫犧象簠簋爼豆之制嚴好潔新無遺缺自宋寶元宣和紹興慶元以來且創且修至於今而始備允亦壯矣於是王侯進諸生而言曰若等知優遊弦歌之所自乎朝廷既右文治尊若道復若家選若人之秀者而官之亦隆且至矣然他日之仕者而泯老者而沒壯者而衰故學無常師而文無定業為勉勵者不既勞乎吾聞宋慶厯時正議樓公郁一出為鄉里師而人輒化之不惟環佩簮笏之盛遂至比屋而舍鄉之澤天未忍絶之也古道如新有正議公者不少而江海客食之士貴耶諸生悚而屏遂命之為記新城縣重修學記自吳孫氏有地江東溪山小邑皆禮義教化之邦故學官之制盛於中州新城縣介桐廬富春間故東安郡況舊為輔邑乎今天下一家夫子之道益大章明宜廟學之設日完且葺弗弛也大德七年今福寧州同知魏侯榮來為爾邑始謁殿既坐進德堂上揖諸生而問故於是釣臺山長何庚孫直學徐夢高前曰學宫改築於邑令陸公演增拓於耿公乘鎦公景修今有年矣圮宜修廢宜舉惟令君實儀圖之侯曰諾明日退自公庭致前漕貢進士何諄偕諸生相與謀曰端孫㑹錢穀曰德麟曰鉉度材植曰景星曰應辰庀工役教諭蔣昻奉唯謹乃建直舍凡齊廬庖廪之序始三月訖工夏五月以成時長官若二數以故撓之而魏侯志弗奪益廣堵制遂新王宫棟宇必崇庭楹必度級磚觚尾方密以麗秋七月既成丹堊輝映衮冕以嚴八月上丁舍奠升降有容牲幣有數既賜胙諸生濟濟升堂各以序進謝曰維學有政維教有本侯亷以自治仁以淑士其知本歟侯曰匪先孰承匪後孰開爾邑俗淳而士美教洽而政行今燕南河北道亷訪副使阿爾思蘭哈雅今江南行臺監察御史劉公弼舊蒞爾邑遺政猶在阿蘇氏治識大體劉公篤厚如之豫日兢兢􅘨弗承今廟學修舉諸君之力而前邑宰之所遺而榮何有焉諸生願記之而未能也越五年方德麟何庚孫始克請記於余余曰新城有邑在萬山中固人物所在而許逺死節睢陽杜稜力拒行密羅隱耻臣朱梁雖盛衰離合之勢天且弗違而志節忠義之氣人不得而泯也非禮義教化之所由積乎而況前有邑宰陸耿後有阿氏劉公其善政其善教耳目濡染固深矣宜乎諸君樂魏侯之令以迄有成也然而修齊治平之學本末精粗之道惟窮通不二漸積有原諸君行且仕矣具告而子弟飭而學志而道以趨而政教以崇忠厚之風斯其庸有怠乎詩云有斐君子終不可諼兮後之布政教者宜有考云重建文公書院記尚論先王之制黨庠術序逺矣唐詔天下置郡縣學厥後四書院之名特聞宋慶厯熙寧學校寖盛處士之廬遂廢逮徽國朱文公始復白鹿洞之舊祀孔子如開元禮尋創竹林精舍升曽子子思以配孔子以周程張邵司馬李延平七先生從祀於是即諸儒講道之地以立書院者益衆文公既沒凡所居之鄉所任之邦莫不師尊之以求講其學故書院為尤盛其徒不事月書季考所習皆窮理盡性之藴其官在郡博士之上其廪官給之田或好義而多資者請自給世祖皇帝混一區宇郡縣學益崇且侈願以力創書院者有司弗奪其志部使者加察詳焉行省設官以主之其選視學正録皇上嗣大厯服播告中外勉勵日加明年置各省提舉以敦教事永嘉陳君友龍以朝廷首選實來江浙始至起士林于家俾復文公書院於奉化之陽士林載拜承命奉公牒以白諸州州刺史而下翕然曰請如牒昔文公提舉浙東常平日循行台溫郡泊舟奉化之龍津長吏率諸生請講書於學宫景定初橘洲姚公希得建海閫敬齊謝公昌元方坐幕府出籌畫前進士李君潚舒君泌童君幼該請立書院於津之左聚徒讀書其下榜曰龍津書院尋遷廟學東偏至元十八年改扁文公書院山長李之皓王鎡主之既亦廢弛先是前朝請大夫趙公崇燾有志改築卒不就檄下日其猶子必摹圖寶鹿山以進其壻前太學博士陳先生著規示之於是州達嚕噶齊察罕知州事李侯炳與其二星侯粲李侯居安議允協其屬臧君涓鄭君元均贊甚力以工給其役以吏董其事木石之費一不以侵官士又明年祠宇成奉遺像行舍菜事凡受學士林而志於立者咸願為之徒鄉人士亦樂以義廪三之一為之贍州若府狀其實於所部於省斯其成矣噫嘻夫子之道散在六經綱領在四書千載之下說益支道益逺子朱子者出諸儒之論始定今天下一家學者無科舉之纍取朱子之書而讀之君臣父子之綱身心家國之目體用兼該本末一致其不為世道深繫乎余不得為朱子徒也余私淑諸人也今而後獲與二三子周旋矩範之下詎可不知其所自邪或曰州刺史之功刺史不有曰是惟陳君之力陳君力足以任斯文之寄而不屈於二道足以起學者之慕而不間於欲故創置書院凡九所復升潤宜興𨽻學之田萬八千畝皆事之著者豫不得概書之云紹興路學重修講堂記大德九年紹興郡學重修講堂成庀是役者山隂趙珆費凡出所捐之田之入初趙氏捐田五百五十畝助郡邑學官廪入且以周里人二百畝郡庠飬二百畝里喪嫁百畝邑庠養五十畝里公役郡侯義焉目是堂之敝將壓也與博士于天瑞王閔全議曰庀工度材惟趙能費慮所捐為廪養者固不浮且速集趙聞命曰視惟謹凡梁木之朽弗任者柱蠧弗支者瓦蓋磚級之陊壞者易新之規不弛前植不虞後郡侯材焉曰是不可不記夫聖人之道在萬世言在六經漢諸儒坐重席諸生攝齊升左右屏虛而往實而歸固將為授受地乎今天下學宫一命士坐堂中席鼓五七擊部使者郡二千石命諸生東西班坐耳入心著果漢儒授受事乎經世之士明道之儒本非二致也自明道之言支以離而經世之法簡以易故有事宦學者往往陋所聞以自髙若不相入也聖人之道六經之言所以為修齊治平法者果何事而漠然若此乎去其支且離以示其簡且易則精粗兼舉本末一致不在所講乎此堂之不可不修也郡侯賢而知人任事者稱義皆宜書侯劉姓名克昌汴人杭州路重建總管府記杭為郡自五代迄今不受兵革之患故生齒日繁廬井蟻附城內外居者無慮數十萬家舊以兩縣置城西北隅以聽城以外之治四録事司分置城四隅以聽城以內之治然後受命於郡府郡府擁行省之垣聽外銓者列四道聨外事者郡有司傳宣之使日來貢享之夷日接五人聚之地轉煩劇郡府方疲於奔命兩縣四隅之治漫不得梳理固其宜也今大參梁公為杭之明年始上圖省府乞以郡治之隙地翼近兩縣直視四隅使皆在大閫之內將以考成治焉既而郡侯廉公希哲沃呼公好古實來識畫規度視梁公為有合郡民吏翕然響從鋸斧之工版築之子執器備用來㑹庭下始聽事中黃堂幕府旁列吏舍臚分㦸衛之門休眺之樓棟宇一新左翼仁和右翼錢唐暨四録事中唐隅列東西門入坐各南向繚以周墻揭以表樹視聽聳仄有壯且麗經始於大德二年訖工八年六月有弗集者郡侯扎呼岱爾伊喇呼圖克與郡二而下實完成之於是大夫人士僉曰治有劇易操其簡則易從聽無比逺篤其近則逺舉杭今為􅀈既劇且煩郡長二坐堂上屬城之吏日趨於庭一公交孚萬慮明白緩急傳呼不出晏坐示儀表景速於唯俞顧不在一轉移間乎然事大規宏更三政始有成皆宜書老子祠碑道有超世而極立言有憂世而教行是皆負上聖之姿周流天下出入渾淪德盛而時不來者之所為也老子是已夫老子生殷之時仕周之日所掌三皇五帝之書四方之志凡天地之間消息盈虛治亂升降之故閲之熟矣是故心超太極之先道出羲軒之上退而論著五千言無為之道忠告其上有為之業善道其下所惡飾仁義之名以禍生民其意深矣於是尹喜辛鈃列禦寇莊周庚桑楚南榮趎士成綺崔瞿柏矩尹文子之徒得其言張良陳平曹參之倫得其道得其言者曼衍多方恢範乘之得其道者運用一致清靜載之寖以成漢文景刑措之治有以哉然而淮南神仙黃白之書出武帝方士禱祠之事行而後老子之道始詘於是峩其冠者為老子之徒誦其書者為老子之學求之老子之道則芴然如也吾嘗致憾於此久矣大德十有一年當塗杜君道堅築老子祠於杭州宗陽宫之右像設巍然凡書存而言立尹列而下班以十子各東西坐衣冠古雅道德以尊既成杜君執簡曵佩執事有恪籩豆有儀拜跪有容於以洗千古荒唐之愧可謂知本者矣蓋杜君嘗注道德上下篇又著原㫖發揮盡闡皇道帝德之藴且圖老子及十子像以翼其學今為是役也使襲明冲用之士旦暮遇之曕仰之下其於宗教非小補也嗚呼羲軒逺矣世不幸而有老子之學長往不返之徒取資山林猶幸有老子之書道德功力之辨有證後世曹參之倫烏足侔哉遂為銘銘曰象帝先惟老子尊道德抑仁義以援淪匪樹異籩豆陳祠容閟班十子東西置古衣冠人仰止載清靜禆世治後有作敬勿墜魏氏福源精舍記夏蓋湖捍海為隄袤百里中涵丘陵林藪之勝余泛舟其下雲飛鳥泊昂紆回振之地水竹縈秀知必有處士之廬也他日錢直卿以書抵余曰豫戚魏明叔好修而理既還江海之事故邁施之業周於丘壑之間築屋數十楹宅湖山之勝嵗時命巾車棹孤舟携酒與客徜徉其間倦不知返固將為兄弟夫婦終焉之藏子幸記之以嘉夫志也余聞而喜曰豈殆豫所謂處士者耶夫人生而靜者也自井田事廢造物平施之力亦窮故有事宦學之士固不得不遊以資藉其身也是故簸㺯毁譽衒貿是非開口見僞舉足成欺雖妻子不得告其情炳燭而不知跋漏盡而不知年非獨不哲且明也今天厚魏氏之家庶有之事固具唯諾庭行友怡政舉不耗落精術以出權謀不搖動筋力以奉拜跪時時頓置泉石錢鎛雲烟雨露之力日滋吾入且何營何求以強人事乎故其趣幽幽可以處休其地窅窅可以觀妙曠然悠然而神以全淵然隆然而智以傳噫嘻子亦知夫菟裘之營亦太晚計繭室之卜殆未忘形唯日與造物者遊厚我佚我碩受其正以樂兹丘之下不殆處士之節歟明叔名文炳而文煒其弟云武夷山天遊道院記天遊道院在武夷溪第六曲仙掌巖之巔屋若干楹中以為堂周以為序密以為室廓以為亭列楯遊空下瞰物狀堂之中圖以太極修真之士處焉蓋武夷第六曲當三十六峯之中緣曲而上路入仙遊館斗折蛇行徑造峯極地轉平敷有園有池白鷴鷓鴣王孫之栖集桃李篁竹栟櫚之叢聨嘯清舞寂紛緑駭紅自然成林由林池橫出左右翠樹青蘿一徑中通以撫仙掌池右屋而流㵼瀑千丈練白珠圓晴空為澍於是堂以集序以析室以煦亭以舒動標靜根杳與目遇窽聲竅噫清與耳謀萬形攢絡之表與抗吾真四時施滅之妙與稽吾神不以虛空與逃蒼莽與適乎夫聖哲之士有不得志於禮樂刑政則託而神仙之歸若安期羡門之屬豈無意於事功者哉故不肯磨涅人事沐漆世汙以自遺天地之外非小智繆察者所能窺也是故蹈厲自然出入無始以求是道有物混成之先庸非猶龍氏之卓者乎院創始丁酉嵗以癸卯既郡人劉時中父子松溪潘儻成希徴張德懋實開山承規以翼者其徒趙嗣祺德懋初遊錢唐嘗學南谷杜尊師之門以狀求記不得辭上虞縣驛記上虞紹興路之屬邑西北行二百五十里有曹娥錢唐重江之險三驛而路曰杭州行省之垣在焉東南行二百里有通明西渡二堰之阻二驛而路曰慶元旬宣之府在焉內則朝廷萬里意諭色授六服震動綸出汗發四海奔走外則獠夷蛋長時節貢獻航浮索引之民氊包席裹之物爾輸爾載委於御府水陸之使日接於道虞為中要船官騎廄之置固不可不壯且宏也初驛曰曹娥去江津二百步而近大德七年春江風怒作抰民屋為濤不可岸障郡檄縣尹阮侯視狀侯白府曰固宜遷乃卜縣治之西得隙地若干畝剃荒刋棘輦舊宇為材益以新植始斥而大其制深堂露軒階崇甃方東西列楹閈高庭廓氣象嚴壯有容有處庖井清湢既潔且具繚以周墻縱橫樹道馬有新廄􅊑有新步經始於七月己未訖工於十二月甲申民不知勞吏不知役既成命余記之夫站驛之制凡九十里凡復民田租給户馬有數水行具舟復有差鋪陳乘坐之具漿飱潼酪之需官總其費利藏於市馳騎風來吏閲其物釃酒繼肉不移而具畨勞息奔馬有餘力櫂夫以熙使者刻晝夜為程際天蟠地上無壅澤下無廋情實經制良法也阮侯為邑公明平恕不倦且忠故深識大體宜不苟於此役也是宜書侯名惟貞江浙行省平章政事高公去思碑示人以善者政之良遇事而思者感之至是故召伯教明南國而甘棠之戒勿翦武公入為卿士而緑竹之詠弗諼方今朝廷念江南之遐逺而杭為要置行中書省以鎮之凡出為外屛宣上德意郡國受命焉者皆天子之宰而久於政而習於民則莫今樞密髙公若也蓋公之知時翕張既有以出際先皇帝一統之運而識大體勤小物復有以昭布聖天子宵旰之仁故自旬宣任専鉞以來逮參預丞轄以進平章之秩出入江浙二十年間其勳勞之所書政事之所及惠愛之所加習於民而杭為近內而宅揆密庸外而藩屛寅協公彌縫贊理不一替焉蓋其天性純明而又居之以忠守之以仁蒞之以莊動之以理故民畏之愛之其庸或有既乎今去政日久副在兵樞甘棠緑竹之思辭之不可以已也夫自古嶽牧之任其重在得人而不負朝廷之知其要在民懷曩嵗今右揆大丞相首居外宰既而衮衣歸兮天下䝉福杭民具瞻曽不旬日畏愛之情至今朝夕未能忘其私若髙公之政歷嵗年而民習之斯民也所以直道而行也矧能溢有所譽乎然去政之為思則在政者之為感其引多矣斯民也又安得不重知所勸乎示人以善之機庸有在也公名興賜名霸都蔡州人鎦成卿久齊記上虞劉氏族故殷起西嶽公吉德培符里黨食其義未單也嘗命幼子炳後其宗今七十翁矣翁之子道常與豫遊氣貌溫深善適人意人願交之大德八年春翁置酒堂上親朋皆集坐豫異席中觴行歡甚中酒道常延豫西偏之室池清石潤竹淨花娟扁其額曰久齊指其額而請曰願乞文豫醉語許之冬十有二月豫將歸錢唐翁父子過豫客下寒雨瀟瀟意戀殊不忍去道常起曰久齊其忘之乎豫因省舊語不得辭天地之道惟久故常人履其常無久不臧是故人之生也門資世學欲久其傳先疇畎畝欲久其守聲求氣應欲久其交飲食嗜欲欲久其適夫亦人之常情也然而盈虛消息日闖乎其門顧將何以恃之精衛之志天地不違愚公之謀鬼神莫奪是故日省月察動能不悖其常時至氣化然後無斁此久則夫人履世之道可日坐而傳也謂豫不信請質𤣥易翁坐微笑道常請書之杭州承天靈應觀記承天靈應觀在杭州東南隅吳山之巔至元十三年元靖真常大師陳君元德實主觀事振宗風於中否𢎞道脉於既傳𨽻觀之田有司籍在常住免其租入元德力也初觀曰冲天創於宋紹興祠天地水府三官費內帑緡錢若干萬燬於紹定逮端平始復建奉㫖賜今額淳祐中增建玉皇寶閣方紹定既燬而未復也神靈不來洞歌無續祈禬之民皇皇乎若有失也觀妙大師鄭君守一慨然曰是不可不圖神營心訃上移時宰江淮列閫千里求施出殿闕於瓦礫之場列憧蓋於塵煤之聚祥飈晝下景光夕遊巍巍乎列聖之居秩秩乎羣玉之佩三官朝而玉皇侍也川行嶽立景福攸介三門廊臺守藏之室齊庖之房周阿崇峻列楹齊同翼以梓潼真祠朱仙閟宇干祿者趨通真者式觀於是侈於舊矣田𨽻崑山之朱塘吳江之澄源范隅與夫在嘉定者為畝一千三百二十有竒嵗入之量以羞以奉始漕臣嘉鄭之功白禮部俾以乙承甲嗣鄭者唯其宗他如鄭者援有據今三傳矣元德曰豫老矣是不可以不記夫𤣥坎之神生於天一成於地六故水為六府之一地平天成時乃之修道家者三官之奉豈其意歟羣生蚩蚩必有司命吉凶影響體物不遺杭今為東南巨鎮梯山甓江廬井蟻附風檣浪舶出入渺莽是故無神以司之乎此觀之所由興也然廢興通塞存乎其人鄭君守一以道為徒以法為子孫無為之為道不泯矣故陳君元德為善繼使繼陳而起知鄭之心𢎞陳之守觀且久弗替而民有常奉矣於是乎記瑞州路妙髙峯北乾明尼寺記瑞州城東北隅有山曰妙髙故宋時郡人祠洪山靈峰尊者於其上嵗雨暘民疾沴有禱輒應南乾明寺尼妙智實主祠事苦行淨業施者信往因闢其宇為佛宫以北乾明自别度元勝永達了敬紹勤為徒敬之徒是為法玉貴亨乃相與言曰事倡而不遂志成而不廢豈學道者謀乎於是築堂以集清鉢築室以嚴齊居西為法堂南為靈峯祠中奉佛天羅漢旁轉法輪八觚又别開一堂補陀知識昔示現像且作堂萬竹之間天風時來山雨涓碧心空識明道與境合妙智嘗坐堂上集其徒語曰吾昔以神祠奉䖍今以佛宇寧施非志之成事之遂乎未幾録教事者以故撓之若不朝夕元貞二年法玉貴亨乃渡河北往御史中丞張公閭宣政院參議達爾嘉依公實憐之以見膽公師父奏奉璽書護持且賜妙智圓覺大師尋覲太后妃子敬奉懿㫖𨽻入位下仍度其徒出入宫闥於是妙智始以遭逢自慶益自砥礪以報上恩曰是不可不記時中丞公行宣院事以妙智狀來俾為文既而朝廷擢公左轄復施大藏經五千四百八十一卷以遺妙智俾其徒持誦之且洊以記文為言夫尼之為道苟非志奪而容寂積久而守堅其何能淑慎其身以成光逺之業而大人君子又樂為振之如是耶此豫言之不得辭也書以為記蘭芎山福仙禪院記㑹稽山配岱宗凡峯石穹窿𨽻是郡者皆勝絶虞蘭芎其一也大德七年春余以庶人在官讀書古虞氏之邦有僧克文以狀來謁曰蘭芎山福仙院住持僧也蘭芎山在縣北西二十里夏蓋湖之南坐殿大海西亞曹娥洪濤之風蓋自天姥沃洲臂橫股直溝斷丘伏而來南為百樓山北為羅巖將直趨海而窮遂為嵌巖方特之勢無土壤林木之潤而尊厲尤甚是為葛仙翁修煉之地石井丹竈存焉今為福仙唐咸通八年操禪師闢菴為寺始也兩杉童童直山門之陽如塔峙立鬱然古意更唐宋風雪物也前住持道順始改作法堂山門若干楹至元三十一年秋也大德五年冬十有二月乙亥克文與其徒如杲志和捐衣資之直且以其道惠夫人之肯施者重創佛殿山精駿奔海異飈集若齊庖廊廡方丈之居以次修舉院始完矣然自咸通迄今無金石以記其故非闕事乎余謂山川偉特之觀僻在江陬海表而使空虛寂滅者坐以鎮之且托夫仙蹤佛蹟以驚動怪異夫亦智巧之所營而善察幽勝者之所必録如來氏以識心見性為宗其為道簡直且易行也人心掩著之故多而禍福之說集故人之趨之也衆而智力猥附金碧之觀無求不成然百工之事具而衣食者迭資焉分田課租之有常入而農者盡敏此其教之果不替乃式至於今也余固喜文師之不怠事食且樂兹山之勝遂為之書是嵗癸卯七月望日記大護持杭州路宗陽宫碑世祖聖德神功文武皇帝以神武不殺一天下故日月所照熙然邃古之世素朴之民以慈儉無為理天下故天地欣合藹然清靜之治寧一之風是以天保定爾之詩海隅丕冒之臣所以朝夕必祝必嚴其地以歸之至元十三年太傳淮安王首舉杭之宗陽宫尊師杜道堅應聘入覲師恭持瓣香稽首上前為江南民命昭謝聖德天顔穆然在廷皆稱萬嵗由是時賜召見訪問治道尋被㫖乘傳江南詢求賢哲有道之士仍賜璽書護持又明年被璽書東還初宗陽之建也析以故宫遺址凡土田之在華亭登瑞者以賜以賚逮尊師之還也方墮劫灰之餘瓦礫未疏𤣥坌罙集於是規舊址輸心識掄巨材畫堵制握毛樹林輦塊成阜業且營之人情厭事而師亦拂衣矣師乃退居吳興即封禺之地蒔竹萬個木萬章曰美可材吾志達矣越二十有一年是為大德八年有㫖賜璽書起杭州路道録住持提㸃宫事師振衣出山疏去蠧蝕斧斤日聞有門有墉崇之植之有殿有壇級之甓之有堂有廡修之邃之有庖有廩潔之峙之檜柏松杉日溉滋之池溝丘阜日疏積之鐘鼓有節幢蓋有儀洛誦戾止洞歌來思維宫二是縫是彌維教父是施是資於是考制定宜大振初矣夫惟老子之教立世之矯矯亢亢屣棄富貴芥視事功者往往托而逃之故呼吸煉養以攝其𤣥禱祠祭祀以通其神然象帝先強道名意果是乎今夫作者談皇道帝德之盛以揚至治揭性命禍福之藴以開羣䝉存君臣政禮之舊以飾人心力棟宇封樹之勤以恢人事則無為而無不為老子之道始日著矣若夫罷軟而事伈俔而食矜厲終身自以為不廢綱常之植聞師之風獨無愧乎乃為銘詩以昭大道銘曰吳山之東峩峩其宫千楹雲翼萬瓦鱗從維久乃隆維抑乃崇維師之功有祈有沖有馮有宗天子萬年四海㑹同杭州佑聖觀𤣥武殿碑北方𤣥武虛危之垣聲光靈異倬有神化是故淨樂之流祥武當之著跡昭昭乎不可掩已夫天生民有欲吉凶禍福動與知防鬼神禮樂相為昭布故禱祠之事出焉而劒履洸洸𤣥纛風靡高視下聽時游民間不回之福明畏之威影響不測有相之道於是昭事孔䖍自邦國達杭有佑聖觀在城東隅昉自宋淳熙更慶元逮端平迄淳祐麓樹田租始具籍入庭壇殖殖丹碧斯皇所以寅奉上帝而𤣥武得專祠焉仇君安一實經始更十五傳陸君宗輔手陳畚挶且營復之當元貞之元王君夀衍被璽書實來凡高居邃宇叢房聨序震赫冲敞昔曠今完登校之章錫自尚方紀烈之文載在樂石蔚為盛矣大德六年十月𤣥武殿災瓊芳不將几帟如失民士歉之於是提㸃觀事吳君存真掄材為倡畫堵以謀金錢之施踵門日來明年五月今住山提㸃孫君益謙被璽書執簡曵佩退自珍庭顧瞻有懷乃究乃理材惟堅良工惟精碩瓦必陶貞石必礱密又明年三月殿成崇修而神靈集整沐而視聽尊玉垣沉沉羽衛秩秩景福攸降嶽峙川行夫惟𤣥武禀剛正之姿負忠孝之烈有象在天有靈在人固不待祠事而尊像䫉而嚴然而人心掩著之故多矯舉之辭侈神道設教容得弛乎夫然則登庭之事拱極之民叩齒而神存覩容而心惕折回邪於未萌援正直於弗植遷善逺罪民不踰德固非所以昭刑政之助乎乃為詩以永敬事銘曰紫微巍巍帝清穆若有人兮樹𤣥纛長劒陸離佩蒼玉手提天關履地軸欃槍無光蚩尤伏下與濁世掃氛毒却邪輔正清九牧我民敬事勿敢瀆有赫其宇鎮南服瓊芳升堂車擊轂嵗時胙之人戬榖蛟鱷遁兮虎豹逐風雨時兮年榖熟於萬年兮荷天祿與之游兮世羲嚳杭州路開元宫碑銘國家混一區宇𤣥風淳化如肇開闢聖天子慈儉無為於其上大臣清靜寧一於其下中外大小之臣有忠無倦禮樂刑政之具有舉無斁斯民熙熙然齒髮太古飲哺自然是故老氏之教昭晰而日尊初唐開元時追崇老子詔天下置開元宫杭州刺史陸彥恭即城北隅以基以構乾符五年戊戌巢賊犯城酒雨弗降遂燬越五十有九年是為清泰三年吳越文穆王復新而廣之介成之三元大師夏隱言銘載之節度掌書記林鼎主之經文大德師樊德隆也逮宋景德中改為景德觀乾興初寧海軍節度使俞承福拓舊創新棟宇凡四百間前進士陳戭實記其事更建炎官事草創宫亦遷改靡定嘉泰初詔以嘉王邸改建邸在泰和坊祕書省之左宫成復賜額開元并奉閼伯之神大洞法師張君實再經始紹定辛卯燬尋詔有司闢大宗正故址更建度道士十有四人仍撥賜田地蕩為頃七十有九有竒至元十三年朝廷置行中書省於杭以鎮南服即舊祕書省為治越十有五年辛卯災宫亦燬外宰購拓基新垣宇越明年住持董君德時遂置故駙馬都尉楊氏宅為宫在城北清湖之西又明年有㫖賜璽書護持命翰林承㫖閻公復作銘詩以記之元貞二年丙申陳君天錫奉㫖住持實嗣董君董君之時今住持王君夀衍二宫事大德四年庚子奉晋王㫖主宫席不就八年特拜宣命以靈妙真常崇教法師住持提㸃仍賜璽書護持給上方五品印光華震赫遂甲諸方故凡宫之役董初創而未完陳欲繼而不遂靈妙式克成之規宏事舉教立道行寥陽之墀玉宸之闕景命有祈明離有阼柔祇嶽立圓靈漢繞霧集沉水之芬風落鈞天之韻登壇朝夕之士列佩維百儼然高居之在人世也若夫雲房星序園池花竹天鶴來庭雲水四集其列仙之逰館歟於是老子之祠閼伯之奉歷世有䖍亦倣乎其人而後倡乎夫老子之道先天地而固存後天地而不悖鑿鑿五千言所以憂世立教言君道曰無為堯舜之所以為君言臣道曰有為禹稷之所以為臣周流六虛出入古始推本皇道帝德之所以盛王功伯力之所以衰不顯顯以為著不泯泯以為博而深涉天人之故其文王之易箕子之疇歟故樓觀之飾起自穆王而有唐以來宫觀由之而盛也夫然則優遊琳館安坐而食高談皇道盛述帝德修身而𤣥冲存神而貞一獨不足以仰禆治道乎遂為之銘銘曰道非有始非無始憂世立言尊老氏開元有詔抗刺史貝闕珠宫聳城市劫灰酒灑東風靡化人幾見蓬萊水皇元區宇一文軌慈儉無為萬國理秦苑秋深千柱峙金闕寥寥開雉尾上帝髙居百神止紫衣翩翩有道士潄滌𤣥風搖玉齒高談道德五千㫖對揚至化天萬里天書晝下玉局璽呵祓嶽祇走瀆鬼吳山蒼蒼浙水瀰下蟄蛟蜃上虎兕大道流行民俗美皥皥熙熙逺九紀甘雨時兮祥風起百榖成兮廪億秭萬億年兮夀天子平章政事賽音迪延齊榮祿公世美之碑江浙等處行中書省平章政事領江淮等處財賦都總管府事賽音迪延齊榮祿公既蒞政之嵗冬十有一月朝廷以近畿艱食使馳驛咨行省以嵗運海道糧石二百三十萬有竒俾春運五十八萬以四月到京及時而賑發之一府愕眙曰凡海運嵗必以夏至為期風力高兢其乃有濟今風東北行大海洋洋鼓帆泝流能有濟乎公曰聖天子宵旰之仁中朝大臣視飢猶已之道承命以行其必有濟公遂勇往募羣艘列海步下量運駕發必誠必信海伴子來起碇之日公詣海神祠下躬具牲牽陳爼豆與神誓言一不煩有司於是公還省坐堂上迫四月二十有一日海道萬户府以狀聞春運米五十五萬石有竒以四月三日訖赴都倉一府歡然相賀曰平章公之力也於是掾史請記其事公曰毋吾寧貪天之功乎先是江淮財賦府初立朝廷以不得人為慮屢形國論逮公陛辭日太皇太后臨遣之曰江淮財賦厥有㑹府汝實領之公銜㫖而來凡嵗入有程分庀羣司一以不擾辦登校半嵗之輸凡三十三萬定人心始安國論用息太皇太后賜織室錦襖大官上尊用寵嘉之蓋公涉歷明本心定知大體勤小物宜有以自植於外垣之右及嘗間公行事其在福建行省也重建泉州興化兩郡廟學王宫齊廬棟宇一新且各置田一千畝以充贍之而士有教養焉建泉州等路橋梁凡六所曰金雞曰南臺曰相額曰營頭曰下輦曰金溪石梁板屋連駕海濤飛甍傑棟平跨虹霓而人無病涉焉築興化莆田國清海塘為田以給民之無産者一千家種之築屋三十間以授貧民之無歸者居之其在江浙行省也適嵗大饑沿門疫且死乃置藥材命醫工家至户視以濟疾病全活者多流亡之民父母有不顧其子拋棄在道公收飬之左饘右粥以治其生逮力能還家聽之收糴客米五百石助有司以濟饑民連糶財賦府米一十萬石下半估以接民食迹是二十餘役凡費鈔若干萬一捐己帑曽不吝焉且國家調度有程官無公帑四方賔客無以奉私覿公在福建則舉鈔三百錠給宣慰司公在江浙則舉鈔五百錠給本省五百錠給財賦府俾規運其贏以備餼牽庸非涉歷明本心定知大體勤小物者能之乎然公亦不自以為賢也一則曰吾貞簡公之所教也一則曰吾忠懿公之所訓也蓋貞簡公出際休運于藩于宣備竭忠力初雲南臣附莫究化理公往撫治喻以教化曉以格律教以耕賦安以舍廬而後雲南始治凡西北一邊近沾逺被無異中土公之力為多雲南地邪而民尚鬼凡築土一尺則死者旋踵公告戒之俾斸土者日以聞嗣是凡築大基建大屋恬然以熙公去之日家冶金鑄公像事之如神明矧惟忠懿公扶翼丕基芟夷草昧神機睿算是贊是毗帝嘉之賜姓賽音迪延齊國體民宜是規是度去思死慕恩在罔極孝敏公培仁積善敬忌天明鍾美弗彰篤生賢獻夫一代之興必有與立之臣而天生明哲夫豈偶然哉成宗皇帝詔用恤典以昭前人先貞簡公以平章政事薨追贈金紫光祿大夫尚書左丞相封岐國公諡貞簡是為考妣岐國夫人忠懿公以平章政事薨追贈開府儀同三司太尉封雍國公諡忠懿是為祖考妣雍國夫人孝敏公追贈崇進封雲中郡公諡孝敏是為曽祖考妣雲中郡夫人三世寵章輝在泉壤朝廷重恩何以報乎士林竊聞在漢萬石君家父子兄弟相繼卿相子孫列貴十有三人唯以醇謹聞金日磾身輔大政子孫嗣侯七世侍中唯以忠孝著固未有若貞簡公父子忠節功在社稷澤在生民流芳無窮世濟厥美如此其盛也今榮祿公深浚之厚積之宜益蕃而昌益熾而大羣從一門玉帶裘馬揚休天朝前拜後恭而詵詵孫子鸞翔鵠峙勳業百世未有既也詩曰無念爾祖聿修厥德此之謂乎士林不肖無似獨不幸得文名然終不以困故一登公卿之門公溫然下士進而與之言曰子文善叙事幸為我述之將以遺我子孫明日世牒行事實來不敢辭乃銘曰於赫皇元肇基立極世祖龍興統有九域厥有賢佐以勵以翼士馬之衆孰啓于征神機之速孰贊於成是生忠懿允忠允誠有政斯舉有謀斯承乃錫宗姓俾恢先烈匪私於公以彰有德桓桓貞簡象賢惟明父子大政相時升平眷彼雲南家有鑄像嵗時必祝人泣惠飬允也孝敏西域宗仰詔有恤典三世封壤維榮祿公興受孚慶昆弟一門玉立斯盛公心兢兢維忠與敬厥聞斯馨邦有善政明明在上我祖在下無忝厥修以翼中夏忠則有君孝則有親凡爾孫子視此刻文彰德路天寧寺鳯林演禪師碑大德四年九月二十八日鳯林大禪師示寂於上都路至元寺於時夜半四衆俱集師問侍者曉鐘鳴不侍者曰未須㬰鐘鳴師書偈已道珍重竟逝天香滿室七日不散茶毗五色舍利火中出門人弟子爭持奉為顆三百餘各建塔彰德珍異其事年十八出家僧臘四十有四凡落髮為弟子者六百四十八人智祐師為之首凡授三歸五戒者五萬餘人豳國夫人老夀司徒為之首凡修水陸佛事一十八㑹所飯僧八十六萬人師諱福演生河間康氏母氏李有身時白光繞舍户及生果頴異弱不好㺯不引味食慈仁孝友殆類成人讀書日誦千言瞭然古今人物成敗痛自感觸至絶粒不食遂祝髮於興福寺父母不能奪其志受信具辨公習四分律方厲專默終楫於深盡得天台賢首之㫖常精進故趺坐不卧人稱為演菩薩一日豁然悟曰言語文字豈究竟事乎乃走太原北師巖習定安居者四年往真定參安國賢禪師復依柏庭如琚山湛三泉和三尊宿晚入筠菴冲公之室直接臨濟為二十代孫萬行具足教法盛行世祖皇帝在位詔師為彰德路天寧寺住持尋恭奉聖㫖上都慶安寺作千佛大㑹法雲布日慧雨馳風獲大殊利至元辛已裕宗皇帝時在東宫以納鉢地𨽻蕩隂者益寺之制俾建舍利寶塔以鎮之丙戌塔成聸者生信禮者去慳輦金以來龎合猥附於是創法堂闢丈室廊楹塔級有覺且崇示寂之旦復以其事與道盡付智祐夫大雄氏以道為岸以覺為海以慈為航惟空諸有故人卬俱涉漸車帷裳憚在未濟得既濟故冥行獨往所適滿意通矣哉演公之為道乎帝王至尊信賞其學元臣碩貴宗習其風故幢蓋所覆作大道場雨花所集無增上慢非有道者能之乎惟不有諸已故己不孤惟不滯諸物故物自至凡聞師之道能無覺乎是宜銘銘曰師之學為世大覺維筠菴卒穫維臨濟不穫師之道空津直造維天子是召維元臣是好維施不殖維精進不息維師之德維塔在空維樓閣重重維師之功鬼神泣其通逺近沐其風維弟子駕其宗維舍利是封山川無窮尚有考蕩隂之南東將毋侈爾碑之豐杭州路純真觀記都城之東有觀曰純真承宣使入內都知鄧公惟善捨宅建也至元十七年冬冲真崇正大師杭州路道教提㸃宗陽宫住持都監杜道堅被璽書東還凡杭之宗陽純真若湖之升元報德實護持之蓋自宋咸淳初築宗陽昭瑞之宫于杭于越鄧公董成焉庚午乃作道院延杜君以訪道書曰純真至元丙子遂以宅為觀以田為資即純真以名之公亦棄事入道更名道恕是為明道崇正大師長子卜人師逢新次子中舍人逢明更名德新德明亦入道仍禮公為師二十年間優遊𤣥默之化吐納道德之華時未嘗不神游鈞天也鄧公可謂聞道者歟德新既逝公亦化去德明遂主觀事几鄧氏所施𨽻觀之田以他故盡鬻民庶其在崑山之惠安者主黃氏未幾黃氏德一亦棄家入觀為徒作而曰鄧以已産為施我以鄧施為産非嗇乎遂即所售田復施入觀為畝七百九十八嵗登米為石四百一十九今視減為則實三百三十五録教事者以聞教所俾以崇正大師二觀事於是觀復有養求余文為記余聞內侍之貴知保晚節而不昧者吾得二人焉其一則鹿泉劉公其一則元菴鄧公劉當思陵驅馳之餘人且言祿而卒恬退非達歟鄧當車書混同之日人且新貴而卒勇退非貞歟百五六十年前後相望人謂宫庭之臣蔽富貴而不聞道兹非誣歟若黃氏者既有鄧田復慕鄧之為全而歸之以身𢎞道亦非達者不能也皆宜書後之人尚有徴云上虞縣明德觀記明德觀在上虞縣之東舊為楊冀王故宅宅有宋茂陵璇宫之瑞子孫不敢有其居改築三清閣以鎮之實嘉定壬午嵗也屬茂陵晚年倚成內政故優假為特厚乃命冲和先生劉道楫繇三茅寧夀觀實來金冠象簡主管閣事中使傳宣時賜召見出內帑金錢白銀醮具撥公田若干頃先生儉素自將寵數一不拜嵗度道士一人冲素大師白雲郭元逸其嗣也冲素丰姿敻特嘗侍劉冲和見上載賡闕庭奉敕披戴緑章清曉禹步𤣥宵羽儀珍宅者也凡六傳凝妙觀復真常大師丁義堅當至元甲申之嵗始改閣為觀請名天師真人畀今額仍度弟子丁禮常衍甲乙之傳大德庚子七月鞠為劫灰巋然一閣在瓦礫東南隅而冲素羽像鬚髮不焦神氣宛然凝妙驚且拜曰吾道固未墜乎於是左經右營建自楊氏楊氏未蝕先源給事資入度材維碩庀工維良乃奉珍閣即南嚮傑視舊制高揖剡青環以宫廬嵗月斯構鐘磬之編琅璈之步威儀風行洞章晝落森羅乎朱衣絳節之來下也縹眇乎川靈瀆后之在廷也夫上虞在丹山赤水之西北太極感祥寶經斯授劉樊之老樹猶存伯陽之九井未竭劉郭二翁游戲道鄉恢張𤣥教即富貴之地化清淨之居卒使其子若孫拓成觀事以昭示神道之教使民知遷善逺罪之歸庸非有道者乎凝妙狀本末請豫文不得辭若𨽻觀之田為畝一百三十有五山為畝一百七十有四地為畝一十有九有司免租入在常住别有籍兹不書清江縣玉泉山靈峰院記遡大江而西入番陽湖過洪都又西為臨江附而邑是曰清江繇大庾嶺沿江而東九十有九折其山曰閣皂山其下曰古封溪有曰玉泉山則閣皂之支也靈峰隆然佛廬鎮之蓋慈化院僧嗣杓所建也慈化在宜春實惟寂感真覺禪師行道之地禪師為南泉古佛凡大江東西䖍事十九故嗣杓由慈化來清江以慧力攝施勸者趨焉清江故為邑舟車之所湊商賈之所歸金銀銅錫之所聚犀象翡翠丹砂天雄芝术之所藏號稱富饒故施者出金繒視錙銖而杓之成有稽矣椎輪於宋咸淳壬申庭楹且完而簟笠如歸手鉢市至而食者飽去兵戍南下而嗣杓拮据之力蕩入蹂躪逮四海為一杓益勵終誓大拓初基檀施日來堵制曰廣殿堂門廡樓閣輪藏之壯像設儀衛幡華經梵鐘鯨鼓鷺之飾如地湧藏泄具大莊嚴樹浮屠三層級天外雲水四集香積為林禪房花木夾以池館繚以垣墻庤乃倉庾院之規始完而杓逝矣且逝語其徒妙慧曰吾以大事因緣出世而香華幢蓋成此道場爾其甲乙繩承吾法子孫勿替引之妙慧不敢忘凡杓之志且成而未竟者有加惟謹由妙慧而特建者則毗盧殿也凡大佛寶殿凡大法寶殿凡鯨音樓以木石成者相其役則其徒了一暨真乘也凡大士像凡阿羅漢像凡大鐘在縣以金鑄者相其役則其徒行深暨了一也其且施且護為方外勝友則蒼山黃憲藥囿劉珌香節黃鑑也妙慧曰是不可不記遂以狀來余惟先王盛時鄉庠遂序而綱常之教行故禮樂刑政人道化之大雄氏者出教法東流而井田之事適廢造物平施之力亦窮夫人富貴利欲之心熾矣於是梵唄之音布滿城郭聚落晨鐘夕鼓所以大揭夫成住壞空之道以聲之而人猶未始悟也則大金碧之觀在在壯麗固未可議其為嚴且侈也然杓之誓力以眇綿成慧之規守以𢎞謹遂而了一真乘行深之徒復以丕協孚志人謂大雄氏之學無體用精粗為世出世法是固其立教之初㫖而非論乎今之所觀也謂佛法之日趨吾不信固不誣也嗚呼夫人禮樂刑政之身食利祿有民人而碩鼠伐檀之詩作可愧也已遂為之記通𤣥觀記通𤣥觀在吳興計籌山白石頂尊師杜道堅所建也師有道之士薊丘李衎吳興趙孟俯金華胡長孺實與之游執弟子禮余最晚大德十年春正月師與余御風披雪行白石洞天由瓊秀上長真登通𤣥觀觀有老子祠以辛文子鈃葛真人𤣥配東有宴坐堂堂之南東有師考妣祠西有覽古樓師坐樓中豫擊玉磬賦反招仙辭清風逺韻飄然有出人間世遊上古之意師指余曰子知所以名乎初漢真人𤣥之生也自然道士支道記訪其父曰通𤣥真人生汝家𤣥既道成計籌山中人未喻也至唐開元時徐靈府注辛鈃書十二篇𤣥宗諡鈃文子乃始封通𤣥真人豈其徴乎宋咸淳庚午豫遨遊其中若有𤣥契遂買山力事畚築越六年應召北覲又六年被㫖東遷思報上恩乃命其徒薛志亨執斧斤以從剃蓬藋剪荆棘清泉發嘉石出蹲者踞者窒者蘖者頓置平理班道就列䕃以松杉庇以棟宇名曰披雲菴山之上為禮斗壇下得煉丹穴穴有葛真人之鼎其容數十斗其重數十百斤又得石室所藏辛鈃十二篇與徐靈府所進者同且菴之成既久蔬有圃飯有田於是拓菴為觀觀成遂即通𤣥名之於時夜半雪淅淅入窗户既罷而睡雞初鳴紅日東出白雪在山瓊林瑤樹玉宇琨臺宛然在目師曰此非渾玉境界乎即之不可見見之不可即非幻乎子方有妻子事後三十年期子於此吾司馬子微陶貞白望子矣然為我記之余曰嘻夫道為天地之始天地為人之始自有天地即有山川居山川之勝而有之則人為之始也前乎辛鈃山之始乎始也後乎杜堅觀之始乎始也中乎葛𤣥通𤣥之始乎始也曰吾師之弟子云者又記之所由始也師相視而笑於是乎記天清宫記夫人稟天地之性負隂陽之姿莫不有清靜貞一之道是故處子綽約氷雪肌膚神人似之猶足以召和氣而致豐年矧一念之烈却笄纓而不事嗜山林其如飴有子丈夫之所不能為亦可嘉已在宋寶祐冲靖大師賜紫沈師謙築庵于錢唐縣靈峯橋之南以庇修真之徒恭定公盧府君實資施之始改作請于朝賜額曰天清宫未幾恭定公薨師謙之徒真靜大師羅道清通微大師胡常净相與謀曰居靜而守冲學道者事也今額在奉常而棟宇弗稱豈恭定公志乎乃景定三年壬戍闢基築畫堵制請于恭定公之子御帶公原深慨然曰吾先君志也其可以弗成乎凡櫧樟杉栝之儲瓴甓碝磩之用丹碧髹堊之供委輸畢具越二年殿堂樓閣廊廡山門方丈之居齊庖之宇像設幢蓋香華之飾鐘鼓之建如地湧天設又明年師謙未克朝夕於新營而羽化矣其徒真妙大師沈元勝實嗣之御帶公復曰居有序而食無田不可也且施田為畝四百五十而強山為畝三百而少於是星階月殿之下雲窗霧閣之間玉珮珊珊籖笈整整不知瑶池翠水之在人世也今住山端靜凝和大師胡正寧乃作而曰創業不易事也守成豈易為乎吾甲乙繩承為第二傳宫事本末不托文以紀金石何以示我後人遂以狀來余惟錢唐繁麗之區富貴浮雲榮華飄風而清淨真一之學山林處子之姿有其地而規拓之有其人而世守之知道逺識之士復能究心遐邇父子承承式以𢎞可久之施廽視鈞天清曉人世夢回觸溷濁而不羞馳恆心而俱化事或有稽矣遂樂為之記西山接待院記西山接待院在諸暨州銀木山之陽釋大山恢公建也初公受信具州之大雄寺寺之耆碩曰德尚師曰惠孚師皆公所嚴事二師嘗退即銀木之地創精廬焉以受四方之行鉢然規制淺窄衆至莫容二師終以是囑公期必斥大而有傳也公既道行江浙住名山三十年公坐人天中舌慧風起教思泉流凡堂下之履㑹者嘗百千人而公之志則退抑弗怡也且曰吾舍孔子之道為大雄氏徒如水中月水流月淨波波不昧水落月空影影俱滅獨奈何忘吾銀木山之托乎於是出資剩輸心識崇庳拓峙削峻築平斬林出虛發石渟碧為門為廡為廩庫為庖湢中為堂前為殿後為方丈之居旁挾雲房花竹罔不崇嚴廣敞侈繪明飾嵗入田二頃度其徒若干人誓以甲乙繩承有引勿替凡雲包雨笠南趨閩海北走淮江暍漿趼屝其至如歸他日揮手龍象却身幢蓋一瓶一鉢笑傲銀木諸峯問信江湖衲子稽首現前調御且歌且詠以鼓舞吾法之盛碩不樂歟狀其事求文於余夫賢智之業必以善繼為有承道義之士每以恬退為至樂况釋氏之徒乎然而超然三界之身本無方所本無去來以諸叢林即一銀木以一銀木即諸叢林何者為繼何者為退乎公道方行振衣而江海景從卓錫而草木風動今志在銀木抱而歸之如雲出山雨澤散布隨機沾足神功收斂還諸膚寸之地則是院之創公其能無情乎公方姓名道恢白雲處士干之孫松鄉集卷一
