body:
  text: 松鄉集卷二元任士林撰杭州路崇福院藏經閣記崇福院在杭州城北門之北良渚之南宋淳熙乙亥建也蓋杭為東南巨鎮市巷碁列廬井蟻附車運馬馳不厭旦夜北行三十里始有良渚之曠紛華既逺馳騁亦休泛苕水上天目此焉西東佛廬巍然坐攝羣寂則𢎞嚴象教亦固其所景定庚申前住山夀滔初建無量夀佛寶閣穆陵書以寵之中奉四大部經天龍森列扶衛有嚴幢蓋香華雲煙披郁今住山師學𢎞持先志飾美緣中外之居小大之宇凡皆葺而新之具足梵典五千四十八卷經左右南向律論東向西向疏鈔北向崇以華龕聨絡窗牖寶函象軸五采彰施炳炳乎秩秩乎有不貽雙林目巧之勝而法輪流轉具不退因於是耆舊僧師秀德廣德垕與凡協力緣信之徒相與謀曰是不可不記遂以狀來余惟釋氏之道無隱顯精粗洪纎髙下性性具圓心心本了而非言語文字所能載亦非言語文字所不載如星辰河漢歷歷垂布而風雨晦冥一毫不爽如枝條花葉種種新好而雪霜根柢一芽不蝕是故佛滅度後五百餘載四十二章之旨流入中土又千有餘載五千四十八卷始具而經律論之宗分矣夫道豈不漓乎然萬目睽睽諸妄靡靡而病得醫而渡得筏而暗得燈道之漓民之厚也今國家以翻閲布慈仁塔寺以莊嚴奉福利而心惟口誦之士等證妙覺道豈果漓乎哉師學師以信廣緣以智𢎞果識通經藏之先意嚴梵相之外慈仁之布於是乎廣福利之奉於是乎嚴等證妙覺於是乎在夫然則道豈果漓乎哉遂樂為之記思逺亭記古者大司徒本俗之政曰族墳墓大夫掌凡丘封之度與其樹數使皆有私地域以容居相親藏相望也凡人之生祖遷於上宗易於下服盡而情未以衰矧若堂若坊左昭右穆以族以位曠百世不能泯也逮至後世士或遊或仕或轉徙困踣有不能追崇其先封以息東西南北之嘆則松檟之奠奉在别子雨露之感敬在禰宗矣此髙氏思逺亭所由作也髙氏自北燕中書令諱泰至魏州别駕諱象可考者若干世自魏州葬有莘逮先府君諱政八世瑩大小左右望邑冢土是守子若孫更數百年幸不以故去桑梓嵗時上丘壠奉魚菽具酒醪且灌且徹戚單以陳長幼以敘酒清肉乾百拜不慊時獨且無思乎夫人父子事具凡庶富且教之道非一日積也清淑之氣行邁以厚去民且士去士且祿又豈獨一日之故乎蓋行逺汲者浚九仞伐逺揚者潔百圍夫亦未之思耳於是子思孝臣思忠弟思悌婦思順而後家思肥國思理前承不愧後紹無怍思其容有怠乎不然孳孳之入利在朝夕嗛嗛之奉樂以妻孥賢不肖且異思矣登是亭者能無愧乎高氏子升侍其父世顯從事江浙漕計與豫逰命記不敢辭頭陀福地甘露泉記昭文館大學士雪菴李公溥光以翰墨之遇行釋氏之學儒名而墨行者乎大德二年有旨來南闡揚教事椎輪湖山葛嶺之西大興棟宇以聚其徒既而正智通辨禪師空菴焦公溥照實來都提點江南諸路築室佛殿之右鑿山泉出色白味甘飲者神醒如獲醍醐於是雪菴李公大書曰甘露泉余觀天目之山東南行為錢唐勝狀其浸西湖水流入城郭為井為渠脂澤漬之黑潦纁之千綆提携萬竈焮煮能使飲者內熱歌舞之童乾沒之兒幻㺯一世雖逹者有不得而却飲氷馬惟泉水之行地中時出砧巖之穴其涵者為冷泉湧者為玉泉裂石而發者為六一泉􅀢石而㪺者為參寥泉皆清涼甘美為髙人釋子之所飲汲况此泉之發於卓錫者乎夫天降甘露地出醴泉為治世有道之瑞漢晉以來猶屢言之自太和磔裂神液不行使斯民不復夢唐虞之化則醴泉甘露何自而出哉方今淳風流布朔南暨漸灌沐之民淪浹至化溢為和氣散為豐年則此泉之發宜不知天之所際地之所出也是宜書春暉堂記青社王伯章為桐廬之三年既歸乃築春暉之堂于東牟之上志飬也始伯章遊京師名在玉堂之署太夫人在堂不得朝夕視飴蜜奉溫凊仕雖榮不樂也既為桐廬道千里而逺不敢以跋涉勞故遺其親然爵以尊奉祿以飬慈伯章雖有離憂母志樂也改成且歸僮迎稚候具綵衣然後入太夫人坐堂上問桐廬所為政歷歷可道山川人物凡所選勝蹈竒怡煩宅暇友賢而尚德也陳説毋誑太夫人欣欣喜見顔色曰吾有子也於是堂若干楹阼足以奉升降庭足以容拜趨環堂之外植萱成翠桞影在户伯章日絭鞲奉觴食上食下問所與乃退家評室語整整熙熙煦為春陽草薰木潤鳥下魚出犀兒洛誦大塤小箎衆婦鞶絲左紛右帨溫乎其為和也夫人莫不知愛其親也如履霜氷至思襲芳暄如冥行露中思步清旭爵祿妻子不能移也然知愛其親則思持其身遺羮之考叔或忮於爭車扼臂之曽參或二於投杼何也夫陶侃雖賢已慙奉鮓曹成雖智終愧擁魚是故擇無過之地蹈永譽之實以求君子之歸不敢輒肆人事以為已纍者義不自黷以為親憂也夫然故雍穆滿門室有暇日雖子從事母倚閭夫亦樂也况將奉板輿以賦歸田乎伯章屬記不敢辭諸暨州夀聖院觀音殿記天地之大生物之衆而水旱有不常嵗也是故禱于社稷禱于山川為國家常典然靡神不宗之日而佛菩薩之教行蓋佛菩薩以慈悲為心有誓願力或化身以示應或尋聲而赴感利澤在生民不可誣也西山夀聖院在諸暨州之陽崇奉觀音大士慈感之迹水旱之祈一雲所雨一雨所潤民以占年在宋咸淳辛未之嵗夏大旱官若民禱雨不應行者樓可欽嘆曰嵗旱無禾民且死矣吾能獨愛吾身乎乃絶粒不食且拜且祈大士前期七日不雨誓以身自焚逮期不少悔鄉父老為之奔走失容可欽左手奉槃水右手執燈炷入坐積薪中火起果自焚熾光未滅疾風四起大雨隨注秋賴以成縣狀其實於部使者眉山家公為文以祭之曰殺身成仁子丈夫之烈也况佛弟子乎命立祠祠之於是大士之道益彰而卓行之迹不可泯也時大山道恢師往來家林嘗白其事且欲廣殿宇以尊像設俾卓行之祠𨽻焉逮四海為一講學諸方始克捐資剩建山門翼兩廡具庖湢而院之規日廣矣既領杭之興福遷松江之延慶乃命其徒曰元亮曰一燈法雷募衆緣建寶殿經始大德辛丑以壬寅二月成中嚴寶陀勝地奉大士尊像旁立樓行者祠而師之志則酬矣大德十有一年冬過延慶丈室明年是為至大元年兩年之間浙以東以旱特聞而越為甚民無食流且死者以萬計師為豫言樓可欽之事為之抵掌以泣嗚呼使可欽而有民人社稷之責能不愛其身以全活浙東之民則大士之澤豈為罪嵗吝哉師狀建殿本末求余文固宜書俾後之知師者為匪徒崇嚴佛事而已遂樂為之記餘姚州建福院記州西北行三十里其山曰大小何山其浸汝仇湖又東北行有院曰建福雲川映帶殆名剎也其地無城郭車馬之煩故深以寂無丘陵崖石之勝故平以虛喧靜兩忘萬法不漏初院曰天香創於梁天監毁於隋大業周顯德二年始復建改曰天華宋大中祥符改曰覺朗今額則崇寧二年也乾道癸亥燬寶祐丙辰又燬何創之難而成之不易也於是甲乙之徒相與謀曰當吾世而失寧宇獨究竟事乎既而浴室以惟在成僧堂以智寂成彌陀淨土之居法堂廡序縣金藏寶方丈之室廢者興圮者理人咸視其力書於棟以有徴也獨前後寶殿規模特壯猶俟邁施時授經師方坐鹿苑山中出巾瓶之剩輸以心識斫美材礱密石金碧眩竒有覺且麗自咸淳丙寅逮壬申凡九載而績成大德八年春師之法嗣孫為隱始克求記於余余聞如來氏以成住壞空示法天下而宫室制度日壯日廣獨非其徒之侈乎然嚴其居所以尊其道侈其可已乎夫以道為徒故其教為不替以法為子孫故其志為有成吾觀建福之役且創且廢而薦更而再燬衆方有為乃卒大遂於經師之手固豈其數乎亦其人之為也起視人世以富貴種子孫百年乃有傳而復何人而成住壞空之道顧乃有常如是獨無愧乎是宜書謹齋記上虞劉惔養明故侍御史忠公之猶子其翁畿漕公無恙時書其配名之義以為世訓養明再拜不敢忘托其語以題所居之室曰謹齋他日過之延豫謹齋之下坐其席有子敬之氊焉閲其架有鄴侯之軸焉倣徉乎齋之外荒園廢沼一花一石猶有平泉之舊焉養明晉衣冠進退語默有古君子之風且曰惔不肖早失先人其遊於世且自惕也故出不越鄉鄰遊不越庠序而周旋酬酢不越兄弟姻族然猶慮夫矢集乎其躬也獨奈何忘吾先子言乎子其記之以昭夫先訓也余曰巨塗則讓小塗則殆雖欲不謹若何不謹今夫車間五返之靷以行大都通邑之中吾知其不折足也上太行歷九疑其有不戒者乎今夫舟乘安擊空一息千里吾知其不失楫也下瞿唐出三峽其有不兢者乎慎在事先和受其福事至而慎營之不足謹乎鬼神不能渝而况人乎請以是刻之吳氏晚香堂記延陵吳成季築堂番陽夀櫟山之陽榜曰晚香志養也初季生敏卓神氣以靈其親夀櫟翁實竒之俾習老子之道且曰皋夔禹稷治足以為經孔曽思孟經足以為治方今天下寧一明哲輩生躬行古人莫非治以為經之學而非爾所企也無已老子乎老子之道固淡泊無華與時消息至矣小子行之季乃退著道士衣冠侍大宗師於朝垂二十餘年入承清問出侍屬車所以默贊聖治一本玄默之化至矣哉嵗時由教事道出番陽境上歸覲二親夀櫟翁方左圖右書以修孔孟之道飲酒賦詩以樂堯舜之治夫人理閫內衆婦槃絲以從伯氏守門户用譽諸孫駸駸以文學名世而成季之歸也凡尚方錫賚歸遺庭下中朝之彥兩院之儒所以寵光歌詠照映槖中季紫衣象簡問安否外躬奉觴上夀愈色婉容進退有禮夀櫟翁喜曰此清時賜也於是堂若干楹庭足以容拜趨阼足以奉升降堂之中鶴髮垂垂左扶右掖于壺于觴以琴以瑟堂之外黃華鮮鮮秋氣為潔以燕以夀于采于擷夀櫟翁亦安且榮矣於是遂即晚香名之既成五年成季命其姪善自京師萬里求記於余余惟逹人之識與時而為流行人子之情養志以為容悅矧當天地淳風內布清氣獨行善察生意者每於此乎覘之而有黃者華風露髙潔達人君子所寄情焉異哉夀櫟翁之為達也以道怡時以志存晚故命其季自詘於老子安榮之植生自無華髙潔之姿出於淡泊故命其堂有取於老圃進不悖於芳妍退有遺於久逺夀櫟翁可謂與時流行而成季可謂養志容悅者矣於是乎記氷雪相看堂記玄教吳尊師即崇真萬夀宫之右築室三間載綢載繆西南其户土榻陶春石煤種燠四方賔客晏坐其中題曰氷雪相看凡京師之名能文者咸賦之紀之既又命其姪編修君來錢唐致辭於余曰余生大江東以道際聖朝留京師二十年每嵗大明北陸之日一氣磅礴萬象沖玄固嘗乘廣莫之風行玄枵之野而太始嵌空之姿坤元馴致之迹飛舞凌空峻嶒抱澤值物班象因川賦形神矣至矣是乃神遊崑崙之上左俯玉樹右拾琪花翠水無波瑶池一色歌浮黎之章聼鈞天之樂超鴻濛混希夷寂寥而莫我知也然而造者為化化者為造相尋於無窮而未始相離也是故堅至之日妙入流形瀌瀌之中洞在見睍羲文不能畫周孔不能辭固與之相入於環中於是言非吹也而吹者之有言接非構也而構者之方接不凝也而履遷毋莫也而敦化則夫氷雪之觀豈非吾玄牡之門而谷神之妙歟揚子有云觀雷觀火為盈為實抑何見之晚耶豫聞而􅋏然驚曰藐姑射之山有人焉使物不疵癘而年榖熟者非子耶遂即其語為之記上虞劉氏順寧菴記越上虞北西二十里有山曰蘭芎大江縈之蜿蜒之氣盛而不泄故回薄紆鬱左右旋引而丘而阜而峯而屛若斷若連或起或仆是不一狀其尤紆鬱而聳列者為楊家尖脊豎股行右薄白馬湖勢曲抱縈舞有龜蛇旁折之勝其山自南東大查羅巖來者雄峙崇赴至楊溪而夷逺引清流疇坂疏衍坻阜星分外列平翠於是楊尖之下實為劉君伯夀終老之卜初劉氏三世祖塋揆形度宜衆以為不協晚遇僧普昭繇奉化長汀而來發書筮之曰有倫有脊白羊踖踖鳴雞跖跖玉兔抑抑劉戴其夕遂以指南決之林巒安妥土壤膚潤若神授夙造時先嬪戴氏卒遂葬焉且旁為繭室以俟終藏乃築樓三間其東扁曰順寧求余文記之余惟天地之造隂陽之凝乃有肖貌而命曰人君臣師友以寵淑之道德仁義以擴充之即事就業隨行建言𢎞百世而不為疚者此身也耶然而旦夜消息之相乘舟壑負藏之莫測有不能一息為蘧廬刺刺戀者人耳人耳也耶是故適來夫子時也適去夫子順也順吾順寧吾寧鬼神不能乘也伯夀其達矣夫大德八年十有二月伯夀嘗與余坐筍輿乘北風度孝聞嶺過楊尖之山登覽終日坐語揆卜之故且指余曰此將廬焉廬成子記之余曰諾今别三年廬果成求記益力遂不辭福生堂記河間牛仲濟以醫道遊公卿間遇余於越與余相好也見所以治病如神迎致之車無虛日所得金錢樂施不餘余固自悔余業之不精也然嘗為余言醫非世不承承非師不廣廣非心不通始余及事大父前榮祿公以醫名於時禁傳祕授少習之矣猶慮其未廣也遊四方事其師李奉訓君左右周旋日奉賤事如是者十年始盡得其道故凡視人疾也人與己一已與元氣一是以疾無隱情而藥無妄試然至於族每見其難為始豫入疾者之家怵然為懼目且熒之息且平之神且營之得其疾以其疾然後視提囊有成劑探而授之百戰百勝如孫吳之兵而後語有流津笑有神來心其容少肆乎遂疾常愈余聞曰嘻疾者聖人之所慎也而托醫醫猶夫人也必也使無疾乎以神遊其微以知修其著世也者言其家也師也者言其傳也心也者神明之舍也必也懼以攝之則志慮持一吉祥來遊語為靈草木為聖仲濟其庶矣乎今將築室鯨川門不拒疾榜其堂曰福生求余文為記余曰持此心也福其不生乎請刻諸石松鄉記出奉化市郭東南行數百步有松蜿蜒如龍頭角爪體具蓋數百年物也或曰一州之秀盡鍾此松故多名儒而少顯宦又東南行二十里萬山蒼然風雨嵗寒不改節色西接華頂雲南東引金蛾太白兩溪如帶無楩楠樟梓雜植人號其地為松林鄉唐開元中析鄞為十九鄉時所名逮更為八鄉亦不輒易南入海為鮚崎亭蓋鄉之斗絶處余家其下聚居亦數百指祖父墳墓又宅鄉之高燥地遂兀兀守故書誓死徙無出鄉意大德二年秋部使者完顔公行郡懇問出處題之為松鄉又竊自念士生田里間具聰明識道理非獨父兄之積亦清淑之氣偶然在人飲其泉之甘衣食其土之所自出以長飬耳目既壯有事四方知天地之大江海之廣問釣遊於某水某丘之下則已不樂道矣仕而遂不遂而客且遊去鄉里益逺則視鄉里益薄猶有鬼神亦何樂孕育靈秀於爾輩哉故材智不接世而裕詩書亦及身而衰前有賢哲亦可覩已余志不出里閭名不在江海守其鄉也固宜安能薄視草木愧仰日星求不為懷土之人歟至若雪霜之年風雨之夕日與二三子披雲煙攬蒼翠飲食與居窮達與謀大夫之却不為傲腹中之生不為誣松乎豫乎求所以無愧於爾鄉之人乎則其庶乎無負部使者之知也遂書以為記淨香亭記世有愛嗜竹者唯晉王子猷不可一日無也蓋此君洞然有忘物之姿而直節蒼蒼為傲時之植故寄情離世者嗜為宜至論杜子美善嗜竹則人不謂然然娟娟細細之句清圓靜好與竹寫真夫亦天涯流落之餘寄情離世於竹為真知而世弗察也因嘗論子猷仕而放者也故心與竹會山隂雪夜之舟西山爽氣之笏竹不能戾其達也若子美非聖於詩者歟心清而聞入目息而視來故神與竹遇有不能翳其清也是故有子猷之嗜無子美之知雖日與竹狎猶夫人也不然則竹與境忘會且移矣答祿氏宅宛丘之陽蹈幽接雅嗜竹尤甚其寄情歟讀書好古以遺富貴其離世歟於是築亭竹間扁曰淨香日與竹對虛心守默直節凌髙亦貌知竹而已若夫碧雨吹晴籜風度逺心清目息神與竹遊釋氏示悟之機聞思之境其在爾乎清隂在門好客當席有曰仕如子猷曰竹善嗜詩如子美曰竹真知固當不為辭屈婺州路浦江縣真常道院記婺須女之墟仙華山在婺浦汭川石穎麗吞沐玄風岩棲谷隱之士築削其中兀為珍宅真常在仙華之下闖郭無譁藩林自蔽澄素葆和大師方無隅實創始之初無隅以清卓之姿早蠲人事既為黃冠師遂判其郡道教事青山白雲心在故梓乃營乃卜得趙氏居夥矣沈沈交手資施基甓既崇棟宇既凌乃清乃祓施以丹碧復寢為宫周榮為序幢蓋之植沉檀之芬霧冥嶽峙雲車風馬來宇來庭茹煉之侣鉢麻夜流枕炊晝集前鹽官州教授吳幼敏實割先疇以奉常入無隅之志始單矣夫人身遊溟涬之初沐被自然之化故出玄入妙宜多老氏之徒而萬目睽睽遊彀日殆山林之士往而不返顧將安所歸乎是故廓清淨之學以求無為嚴神道之教以示修省天真與遊恆性允保亦世教之所不得無而道院之所由成也陳君公舉提舉江浙儒學以無隅狀來㑭記其事不敢辭蕭山縣慧明菴記金華樓慧達築屋蕭山縣之陽畬構厥考嚴事佛居以受邑人係念之徒道暍豫漿重趼豫屝呼庚癸者豫食飲以規以誓或以基築或以木石或以土田施者乃來遂成一方精廬平章紫微史公題其扁曰慧明至元十八年也大德九年春余猶子愭讀書是邑以其狀來求文人固有具冠巾有妻子不墮四肢之敏出租賦奉公上口誦寂滅之書以與人為善之歸果在所豫乎余聞莊生化蝶之喻髑髏之言然後知如來淨土之樂宜有不誣也此劉遺民陶元亮所以日從事廬山中以姑遺此世也然逺公之教既行人無貧賤愚智一趨於達抑觀其徒以義相合以禮自防其於飲食也忘生殺之機鬼神也無諂賂之禱平時以智相營以力相奉逺行者家必有歸授記者死不倍去此菴之所由成而豫言之不得弛也遂為之書江浙行省春運海糧記江浙等處行中書省平章政事領江淮等處財賦都總管府公賽音迪延齊榮祿公既􅊩政之嵗冬十有一月朝廷以近畿艱食使馳驛咨行省以嵗運海道糧石二百二十萬有竒俾春運五十八萬以四月到京及時而振發之咨有平章政事榮祿公實董視焉一府愕眙曰凡海道嵗運必以夏至為期風力髙兢其乃有濟今風東北行帆一日起大海中漫爛不見蹤迹舟控御失所則碎破沈溺患在目前能有濟乎公曰聖天子宵旰之仁中朝大臣視飢由已之道承命以行其必有濟公遂勇往而海道萬户恩公某日聽指畫乃度乃籌凡募舟大小凡四百餘榜舟之徒凡四萬餘凡費募傭錢為錠五萬七千庾人告嚴量概必平不浮病官不損耗入以三月二十有一日起碇於吳之嘉定劉家港而恩實部之部有千夫長從其翼先起碇之日公詣海神天妃宫躬具牲牽陳爼豆與神誓言曰海漕之運我國家萬世之利也春運之役其昉自今凡在人事者豫既克盡之矣大海洋洋則爾明神之責也毋狂而風毋冥而霧毋剽而暗嶼浮椒毋滯而濁水露磧俾遂善達以充國儲神亦與有賴焉禱已明日大歌小謳千櫓具發民氣以增江海明穊於是公還省坐堂上逮四月二十有一日海道萬户府以狀聞米五十五萬石有竒以四月三日訖赴都倉一府歡然賀曰平章公之力也於是掾史請記其事公曰毋吾寧貪天之功乎掾史咸曰是必記以著始也而屬文於余余謂天地之間惟海為巨包括運轉與天同流是故浩浩洋洋泛濫九州之外自刳舟剡楫之世不能一日通也昔在帝堯都冀州日四方貢漕之道各因其舟楫之便而達焉故島夷之貢夾右碣石而入而青州之貢自汶達而入揚州之貢自江海達而入載在禹貢然猶不可考也堂堂天朝包括海外而東南漕運之利起自古揚州大海之濵而達於古青州之海屈折碣石之南西而京漕之道通矣大舶如山狂波為陸浮遊天地之際萬里一席可指日達也然而大海之運六月一息舟人必以為占而南外之舶相銜而動故每嵗海漕之運亦有待而後發乎今以三月起運而旬有數日之間銜尾而達公不失期私不耗落夫亦天彰榮祿公之德故為之返風以濟也猶有鬼神其可欺乎後之言春運海糧者自今始於是乎記曹氏捨田記吾聞佛菩薩之道如水中月而清瑩無瑕之淵光明委照上下通徹無有障礙若華亭曹氏與佛有緣心心相印有開必先兹非其徴歟超果寺在今松江府治之南西實白衣大士瑞光示現之地衆敬趨湊慈感如覿事有吉凶禍福其頌百三十置籖以卜之諦信之歸者亦多矣昔帥幹曹公某以子孫畬構之重卜乃後紹籖言其度吉有逺猷今宣慰副使勉齋公夢炎日事精祈幾有先見至元三十一年以事禱不孚襲吉告無易辭至大元年以疾禱籖復示之父子歡榮且期七月事有寵遂及期習卜亦不易也事下果然先是沃洲光曄師住山日嘗迎大士小像行化公疇昔之夜夢白衣人求見纓絡珊珊云自超果寺來明日臨門公益悚然夫大士之於曹氏何影響相示若是耶於是公嚴事日篤凡道場幢蓋之地法食雙轉之輪屢施不倦自大德五年迄九年施財若干貫米若干石田若干蕩若干畝今住持北山文勝師以所施田嵗入五百畝補齋粥二百畝備修建百畝舉期懴且嵗以正月集千僧誦經典固將彰大士之道侈曹氏之施而久之也求文以紀其事夫惟三兆九筮之道有鬼神焉所以示也近世有籖卜尊像設以示昭事讖言詞以明吉凶猶繇頌之流也曹氏父子以積善聞其鄉邦其始卜也固知遭遇昌時在此兆矣及宣尉公之貴也紫衣照坐小心翼翼今九十翁矣儉而有度富而有守整整熙熙室無妄祈其心固與佛菩薩合一誠交通百感孚應猶耳提之面命之也是則措封殖之入𢎞可久之施以崇殿佛事俾菩薩之道益大彰明而子孫之有繩承德業之有出處動於此乎卜之則精神志慮清瑩無瑕上下通徹豈徒為福田利益計哉於是乎記佘山報恩院記禹迹揚州之地三江八震澤定中為吳松江瀦為澱湖播為三泖山自西南來越三百里清淑之氣盛而不發將趨海而窮纍纍隆起出平疇廣野中若斷而浮若連而伏其峰有九焉在華亭西北自華亭為陸氏封壤山增而秀可第而名之其一曰佘氏之山有寺曰報恩院僧紹瞿承其祖佛慧玄辨大師建也初大師説法住世時首居華亭之崇夀未幾遷南廣福院又被旨住持延慶教寺講席風生學者景附垂三十年嘗泛舟佘山之下徘徊登覽曰是不可以建法幢乎於是與其徒紹瞿謀買山築精廬其上將終老焉然規制弗廣念無以稱嚴事也乃出資剩乃輸心識拓幽平削竒峭斬木出虛疊石通峻其經營之明年有旨住持杭之南天竺崇恩演福教寺大師振衣出山盡以其事囑紹瞿成之崇之闢之有殿有堂跋之翼之有樓有閣三門兩廡十笏之居齋庖廩藏井湢之宇幢蓋鐘鼓之飾髹漆丹碧之采天龍廽環法象昭布紹瞿之力日殫而大師之志則酬矣且曰剡源吾師也剡之報恩吾受經地也即是額以標存之所以示不忘也瞿等勉之紹瞿受命不敢忘既奉法旨尋又欽奉聖旨命紹瞿實住持之俾以乙承甲流度其徒而世守焉夫金仙氏之道本以孝敬為先以蓄植種德然後超入空空安詣上果是故大報恩七篇昭如日星然而空無蕩潏之論出則析分義以為髙卻情實以為達或不知其道而因違其書謂超然三界之表而所尊不得而企之也謂廓然萬法之林而所遂不得而揉之也兹非誣歟吾觀紹瞿事大師數十年凡大師之所以事剡源者則既聞之矣今持以事吾大師也宜將日勵而不忘慈恩之報表裏相謀比逺中應固宜示規接武有引勿替且以洗空無蕩潏之愧使皆知孝敬之歸則是院之建也豈徒為莊嚴像法而已哉遂樂為之記松江府華藏院記釋氏之教在天下幢蓋之所樹立鐘鼓之所宣揚龍象山立不以為侈棟宇星分不以為泰蓋鄉庠遂序之事廢而尊君親上之心遷善改過之地民知有歸焉有政化者不得而弛也華藏院在今松江府治之西超果在其南竹林在其東龍湫在其西九峯纍纍北引而赴其後金碧爭輝梵唄互答可謂盛矣至大元年冬余客華亭因過華藏之院自山門兩廡寶殿珍閣中外之居小大之宇輪奐一新種種嚴飾儼然化城寶坊之在人世也少則一老僧出迎曰住山從得也遂相與登千佛之閣坐方丈之室徘徊久之起為我言曰從得越之南明人也少受業華藏寺負笈掖峰習天台尊者教宋咸淳甲戌侍其師囦叟法師來雲間今三十年久矣嘗蚤夜以思曰古之人有去其鄉者即其弛儋之地以明其山川以繫雲嵐草木之思今老矣得一丘以寄吾道則吾志也至元己丑龔氏以宅一區售豫因草創之而規模猶未稱也嵗壬辰既主佘山之普照廢者興圮者理又七年而歸嵗庚子始克廣而新之豫手拮據豫口蓄租亦云勞矣今像設儀衛幢蓋香華有經四大部熏誦之士集焉有田若干畝齋粥之須具焉如是又十年而始成既成遂即華藏名之而華藏之在南明者揭其山門資其緣力亦所不敢忘也明日以狀來乞文夫人與天地並立苟其道不足以𢎞人其業不足以世守則亦泯泯然生死去來而已耳從得釋氏徒也使日談空空樂在寂滅羸形毁體抱其初而去之亦云其教固然也而乃積銖纍寸以成一方始構使負笈之遊不失其圖受經之舊不忘其初非有志之士乎嗚呼彼習孔子之道而遊宦終身桑梓之隂越在度外視師果何如也嗣是而興者尚克紹而大之則師之業為有傳而師之道為不墜矣於是乎記興聖寺重修寶塔記興聖寺在今松江府治之東南漢乾祐五年鎮東軍張司空捨宅建也寺三門之外甃石梁其南步石梁而西有塔屹立如空中住其高若干丈九簷四面崇峙而方縱廣正等宋熙寧元祐間賜紫沙門希介與如訥如禮協力建置嵗且久甎瓦頺蝕丹堊剝落四方瞻仰或怠或歉至元二十有一年僧行高竭囊鉢之入嘗葺而新之大德四年行高逝而清裕主之明年七月颶風大作塔不得完立上而相輪下而欄楯掣入空中墮擲如棄故頺蝕而葺者不以支剝落而新者不以具矣裕乃嘆曰當吾世而塔廢之不可也乃出資剩為倡衆緣駢來甎瓦泥土車運舟輸甃補加密椽梠欄檻雲擁星附莊校益精雙珠七輪插其危金繩寶鐸縣其觚九疊崔嵬千燈周匝丹梯上通白蜃外飾中分佛如來坐層立菩薩人天殊特妙好視創始為有光既成鈴鐸揚聲山河倒影神光千尺曉夜發露戍守之士瞻拜失容可謂偉矣余惟古聖王之治天下也布治象于象魏振木鐸以徇之所以示教化而民知向方也今佛氏之宫設寶塔於閫域之外飾諸佛像崇示萬目使樂善者趨焉非其意歟然而佛在世時而從地涌出遂分多寶之坐佛滅度後而為供舍利甃阿育之藏是固神通願力之所致也夫以塔身山立巍巍然萬物之表崇善避惡揭迷塗而有歸使表正欲從之心一以破邪見稠林之惑兹非政化者之助乎清裕師有精進心為殊勝事一塔之成豈易為力哉遂樂為之記四聖延祥觀碑銘北極中天之尊左右前後有奕有靈尚矣故四聖之奉著於隋唐蓋招搖在上天帝之居四衛所領威德為鎮在天成象在地成形而興運立極著見之迹昭在人世是故歷代虔事之典唯道家為最嚴宋建隆初置紫極觀於汴奉四聖也逮紹興十三年置四聖延祥觀於杭初顯仁太后奉四聖惟謹思陵南渡顯仁北歸行幸湖山神光靈響若有玄契遂出金錢內帑命漕臣董成崇立觀宇以昭報事越七年賜今額撥賜田地山蕩𨽻杭蘇湖潤總若干頃命左右街都道録彭君德淳實開山翼以瑞真館延棲真之士多幽人韻客寄迹其間有林處士之風至元十三年玄教大宗師真人張君留孫出際風雲入覲道行眷隆築崇真萬夀宫於京師留侍闈庭十八年有旨命主延祥凡觀之役一以舊褐祗事二十有二年有以慧力掩真人者主之觀之徒雲萍東西無所於寄事聞於朝大德元年有旨江浙行省撥杭天宗河之北官地若干俾興四聖延祥觀凡田地山蕩舊𨽻觀者復籍入於是大宗師際遇日久效事忠勞乃命提點吳君全節左右經度且囑杜君道堅孫君益謙吳君存真實規畫之完有俶載日理嵗入植材庀工惟崇惟良首營棟宇恪事祈祝八年三清殿成明年四聖殿成若門廡樓閣齋堂庖廪以次成千楹柱立萬梠藻附靈修扶其崇矗象緯瞰乎飛跂儼然瓊輪玉蓋之來下也赫然金矛玄纛之前陳也璽書護持雲漢疊見玄教指歸川嶽景從於是觀之規日崇且闢矣然觀之遷襲有數事之振起維人不有廢者其能興乎夫國家以祈天永命為嚴事以神道設教為丕圗况威神福德所以環拱中天上翊北極為國重鎮為民巨依昭事敢不虔乎乃為銘詩以紀福庭銘曰中天之居帝九重招搖在上紫極穹帥垣四列帝曰庸威神福德鎮域中於民有赫國有功璽書晝下青玉驄棟宇日闢疆畝東峩峩千柱臨天宗真人上界大道崇二三祗事恪以公神靈監觀明且聰時暘雨若年穀豐永作神興帝業隆於萬億年承皇風東平杜氏種德堂記往時杜先生善甫以道遊齊魯客武惠公之門時中原甫定公方握重權為外屛先生從容其間切磋磨琢之德善謔不虐之道衛人所以美武公者武惠公有焉則先生善甫之行其道也故東平稱杜氏凡譜杜曲而系東平者皆名其胤夀康老人則先生之胤而武惠公之老也作堂於平隂之原名曰善善既而改曰種德其孫楨以其伯氏朴之言來楨與余遊久稔其祖父伯氏之賢乃告之曰莫非天下易生之物也而種之之道惟其人故一年之計在穀十年之計在木夫穀之計敏於人而命於天木之計敏於地而命於人命於天者水旱沴之螟蟘疵之命於人者牛羊踐之斧斤尋之不以水旱螟蟘惰吾年者穀常豐不以牛羊斧斤厄吾故者材常足是故周於穀者食飲之沃施子孫周於材者棟宇之蔽達城社夫人之種於德也何獨不然是故以孝悌忠信為根柢以禮義亷恥為芟夷藴崇其始枝葉庇於家其久連雲匝於里族而後沃之以孔孟之道華之以詩書之辭於是為楹為杙世以材聞似枅似臼機與天入吾儕小人不能以食自藝况能以材自充又况能以德自邁乎聞夀康老人封植之風而朴與楨也華且沃之為塈則楹與杙之求百世未有已也於是乎記松鄉集卷二
