body:
  text: 松鄉集巻三元任士林撰承事郎栁惠考妣墓誌銘承事郎栁惠貳奉化州事三年且歸將以大德某年某月某甲子合葬考妣於某州某縣某鄉之原墨而謁諸州民任士林以告曰某不天生二嵗而孤侍母氏洪之鹿邑淩氏淩氏愛如已出俾冒其姓者三十年母氏病且没慟哭以語曰爾河東栁氏子也曽祖考居商水今有其族爾父年來四十輦財沙河之滸河溢知不可免乃以髪挂車上卒溺屍遂不流予號哭七日得其屍迄瘞於商水之南門爾呱呱在疚予愳不能以嬰兒存仲氏日至未亡人之側予嚙指以誓不貳逮兵震山東殺氣蔽野予抱爾以泣曰天乎不惠我孤寡使圖存乎時淩氏居元帥郝公麾下母子頼以苟活今天不乏栁氏祀俾爾有仕進事我死爾其復栁氏姓且啟南門之瘞以予骨溝而合諸墓不然生不能事死又離之以重渝也栁氏其謂我何於是母子哭失聲而屬纊不起矣嗚呼痛哉某乃行哭商水求故族拜吾父南門瘞中既辟江浙省掾乞改姓栁氏今以考滿入仕為七品且貳民社其敢忘吾毋言乎嗚呼以不肖孤累吾毋大節以存聖善之德皇天實聞使栁氏祀不墜死同穴以明初心婦道之至隱人子之至痛子其憐而賜之銘予聞而悲曰異哉人事之變乎春秋書事以示懲君子原情而要禮昔宋范文正公飬朱氏祥符八年以朱説上第且登朝始復范氏姓宗祏之奉事考妣如一栁氏之志視范氏無越予不得而辭銘銘曰嗚呼父也卒不得其命也嗚呼子也壯不知其姓也母也天也全其孤以為貞也溝而合諸墓也范朱説氏以為徴也示人子之痛也尚於此乎訂也鄭氏夫人墓誌銘夫人鄭氏濮州觀城縣東谷疃人年十六適同縣皇甫瑞是為皇甫氏冡婦至元六年初籍户為軍南戍襄陽皇甫君在行中夫人泣别願功業自愛妾在勿以親老為憂也夫人髪曲局不膏沐躬勞苦事舅姑晨省夕定禮如良人稻粱魚鴈必具必恭菅蒯蚕絲以詒以肄退則絺練繭緼宻縫手熨逺將屯戍不爽寒暑舅姑嵗時毎嘆曰嗟予子使不興行役之懐而婦力也逮十有一年移戍京口且從事府帥家間至舅姑坐堂上召夫人語曰而夫身在軍旅遂參畫諾是歸來有日也爾以壯年得配未有嗣息爾其往雖有離憂吾志樂也且叔娣良遂命仲氏以夫人行夫人至軍中卑抑以和樛縈有度良人言笑有如信誓未幾姑劉氏卒夫人以舅命召還而子師曽生既以師曽見事舅如姑在益恭及思曽六嵗夫人教讀書早夜或曰南戍逺汝父不得朝夕子視爾其勤學不負汝也迨師曽年十有一而皇甫君在杭召師曾侍由是母子相望數千里外夫人以子存亡不可知病或屢月而師曽亦念母氏之獨留濮也大德三年春師曽授徒為飬六年冬迎夫人來子母相依纔數年爾而夫人以沒哀哉夫人生於丙午八月二十六日大德九年十月二日卒於錢唐客舍享年六十男一即師曽也女一大姐適同縣王氏孫男二杭州驢重喜孫女一嬌嬌以某年某月某甲子歸𦵏於濮州觀城縣東社楊疃之原祔姑兆也且𦵏其良人皇甫君語其子師曽曰而母事舅姑盡婦道事余盡妻道其教汝也盡母道敬戒之節獨何愧乎而余之愧獨何尤乎今爾事母無日而事余長也獨無悲乎蒼蒼者天果孰為之哀乎師曽泣不敢忘狀夫人之行以求銘於余余感母子之情著夫婦之義乃為之銘曰行役勞兮我思其閟尊章具兮我力其瘁子詩書兮我教其遂胡不百年兮以永中棄人有母兮父憐之獨使令子兮終身其悲全以事父兮揚名以為期庶㡬有慰兮母氏之思汴張府君墓誌代趙子昂作余汴人也不及聞汴父兄往行垂二百年至元十七年始識汴張好德於杭讀書好古退讓有禮固知汴父兄之教未衰也然夢寐故鄉蹢躅餘息居㳺固相好也余既召為夏官入直集賢出貳濟南罷歸復擢汾州既又聨師儒於外十數年間靡有定役好德才一相鹽筴事不仕在陋巷情未嘗一日去余大德九年冬十月乃載拜致辭於余曰先君没江南且返𦵏於汴然不得銘墓上重念先君操行侔古人當天下廣大不屑以仕為意獨以詩書禮樂之舊散落江南乆車笠故交終不以游故辱言色是固識超於人也而忍沒吾先君乎余聞而哀之曰是固余責也好德兄事余若翁即吾翁死而潜之豈情也耶君諱謙字子讓世居上谷完顔氏既渉河以遷遂為汴人大父某業修躬行尤長老莊故不樂仕進父某以貲入為宣武將軍佩銀符鎮防行營都統君生兵末魁梧有志行孝親弟長履人所難都統府君既没女弟四人少長笄嫁婦奩用將一事望族而畬而構稱在鄉黨晚㳺江南歴聘遺落屬纊之日戒好德曰地廣趨煩苟得易患爾其慎之言畢而逝君生於戊戌嵗十一月某甲子至元二十二年十月某甲子卒於錢唐客舍得年四十有八娶髙氏中書省參議明之妹男三人長即好德次好義好善女四人榮適曹希古錦適王氏鸞適行臺中丞程某子仲綿適呉氏孫男三人松居椿居雪居女四人鳯適劉世昌雪適徐氏餘尚㓜好德以君卒之嵗十二月某甲子奉柩歸葬汴南薫門外龍岡祖墓之原越二十年呉興趙孟頫為之銘銘曰惟不競也孝友以為政也惟不貲也命義以為貞也懷散亡也乃南適也死返卜也惟汴食也彼肯畬也苖則碩也穫挃挃也耜畟畟也臨淮府君王公墓誌銘府君姓王氏諱庭玉字國寶保定路清苑縣人其先完顔氏也髙祖太保公四子諱三聖仕金河間路兵馬都總管畨譯是為曽祖考祖考諱留幹不仕考諱安住授懷逺大將軍安州刺史嵗戊寅臣附尋始譯姓改名安生子璧次府君也府君生有機略習兵書識吏事仁厚其天性也在蔡國張公軍中以材勇聞己未從攻鄂州最陞亳州萬户府長員首領官事蔡公終始一節屈小就大蔡公終念之凢幕府籌畫必聴無遷事成敗勝負如龜卜數計至元九年遷河南路統軍司知事受勑牒成淮蔡壁襄樊城光化凢應機出竒功不在諸將下軍儲措置士有餘餉從賈統軍詣闕賜衣襖鞁轡弓箭銀鈔有差改遷招討司經歴佩銀符從獲南渡自丁家洲與宋孫虎臣遇克之追之龍江磯兵南舟二校自稱太平州帳下持守臣蠟書詣軍前軍中欲殺人於貨府君力爭之曰是絶篚迎之心也明日大軍臨其城民以不降死寃哉况大功未成無以示信乃以二校見受檄而還太平乃獲全民至今祠之丞相由是知府君兵至建康令給事中阿里召府君軍中曰建康新附民未知政宜宣撫之府君曰某少兵間莫諳民事固謝不能丞相曰好勾當退幕府曰簽事公丞相意也遂受檄充江東路宣撫司事時元帥唆都左丞亷公以軍興事殷凢郡政大小府君理之流者集附者歸一郡按堵溧陽既下行伍間有係累良民婦子為虜者府君出其屬還之十四年宣授建康路總管府治中丞相曰王治中吾府帥師也民其理矣十五年陞朝列大夫招信路總管府達魯花赤佩虎符招信尋改臨淮俾仍舊任佩金符時丞相方解兵政聞之咨中書省俾仍佩虎符府君固讓於是首崇教化新廟學治官廨飾使館勸農桑勵風俗整如師律洽如父兄初淮盜起暴甚俄二男子飲酒臨淮兵家軍伍張喜踪跡之乃命録事徐霆逮捕果吕文景吉二其魁也盡獲其黨一百七十六人殺人二百餘情得中書省以聞戮者七十人淮内以治先録司李哇哇道臨淮過泗州吏誣哇獄既具省府以府君亷明命讞之府君得其事出之哇得不死御史大夫相威奏江南亷能官五十人府君在中改授漣海州等處屯田總管先是上屯田䇿者偽以墾荒為言官給鈔市牛耕實未嘗有牛也年輸皮給市數謂以勞死田未嘗収而牛數市無已也府君不忍欺實白之人或誣公不治世祖皇帝素聞公長者不報府君遂去官居亳築亭曰飬志築堂曰樂善與清時大儒政樞鉅公以年老歸其鄉及仕而未擢者賦詩飲酒優㳺杖履相適也詩書以課子孫耕植以治生理於是府君老矣大德二年六月某甲子卒於亳州寓舍遂殯焉卒年七十有五生於甲申嵗六月某甲子娶同郡魏氏録事之長女先府君十五年卒於髙郵官舍歸𦵏清苑縣中陽村祖塋之右子二人長曰源侍官建康以卒次淳以父澤授保義校尉杭州等處檢校大使女二人長適江東道肅政亷訪司經歴奥屯履次適管軍總把慶都邸某孫女二長在室次適江南浙西道簽肅政亷訪司事焦昉孫謙孫男一可道以某年某月某甲子奉柩合𦵏先夫人之墓淳以狀請銘於句章任士林嗚呼完顔氏亡且百年子孫散落卒為善人忠在朝廷澤在民社人何獨不然顧余乃得銘墓上淳實知予子可道又從予學銘宜無辭為也遂為銘銘曰以仁厚為兵兵乃強以仁厚為政政乃成以仁厚為家子孫其有承匪府君之私抑國之慶過者式焉以視此銘慶元路道録陳君墓誌銘大德十有一年秋七月六日太極靈妙𢎞教法師陳君自上都還京師曰聖天子當御山川鬼神其底寜矣吾豈復游人間世乎越十有一日遂化於北門之新店其徒陳世素聞訃至與呂震亨㑹治終事至大元年集賢院奏以其徒乗驛奉柩還𦵏家山先是教主三真人追念陳君身侍闕庭十有七年際遇三朝寵渥至矣凡上方賜賚一不以私其徒惟授經舊地以乙承甲志死不渝震亨從京師最乆必承無以易迨奏聞震亨泣以别三真人且諭之曰死哀生榮在此行也震亨三泣不敢忘明日拜璽書震實副陳君世素遂収陳君之行請銘于句章任士林曰師諱可復字復心雷谷其號也世為慶元路定海縣人曽祖考祖考考皆有吉德不世耀師丰姿夐特神氣以靈年十四從觀妙葆真先生陳君與真游乃著道士衣冠觀妙實師内觀先生王君師詮内觀役召鬼神名震一時觀妙出單傳道行江浙至元十有四年世祖皇帝遣使召見未幾示化師行䘮盡弟子禮不越已乃退習天人性命之學復從先天道山先生林君某方外五年遂盡得太極諸家之藴於是内外境融出入天造而阿持龍集寂在雷聲矣二十有五年戊子夏郡大旱吏禱不應時中書左丞公旬宣浙東行郡率長吏迎師即府署禹歩斗折雲興纛影火挾令符大雨隨注既而定海長吏迎師禮有加叱咤之下白龍翔空乃大雷電以雨明年己丑夏邑象山以旱特聞迎師如定海長吏請益師一詣壇上雨輙作乃下與吏僚佐登樓與雨約曰酒起雨止雨果如約不爽所至民吏鼔舞香花幢葢泣迎歌送仰為神人又明年庚寅有㫖尋訪髙道浙西道都提㸃董君德時首以師應聘越二年壬辰春三月賜見尋扈從大駕上都夏五月西至灤陽灤陽早逾月不雨有㫖西行祈禱師奏曰臣壇在轂下西方當有沾足明日西土以雨聞有㫖西土既雨宜令上都滿盈師遂奉槃血盟諸天神立表下漏日中大雨上都果滿盈逾西都又明日上將幸龍岡旦暴風大作揚沙走石清蹕慮無命師止之師噀劒一揮風恬以息上大悦賜織室紫狨且給大官牲具以祭嗣是凡風雪雨暘禳必免禱必應凡祝釐聖躬必習吉由是天眷日深師冲澹素定便蕃恩寵亟拜輙施無餘也逮事成宗皇帝一德格天棐忱屢著具不一書甲午有㫖慶元路悟真觀住持提㸃大徳元年丁酉春考府君没於家師號慕欲絶即上奏乞歸治䘮事上賜金帛且遣使館伴以行秋復入覲天顔温勞之某年某遂拜宣命慶元路道録𤣥妙觀住持提㸃𤣥妙即舊天慶觀也中陳畚梮之餘且洊更主持規制一廢師首出賜金且戒祗事者以嵗入撙常度三清寶殿興建一新凢棟宇之役有舉無弛教門實嘉之甲乙之傳遂定有歸奏聞實為本觀開山師生於宋某年某月年若干弟子道士二其一陳世素慶元路道判其一吕震亨慶元路道録其授受雷法最著者今𤣥教嗣師總攝江淮荆襄等處道教都提㸃崇文𢎞道𤣥德真人吳君其人也次則大都崇真萬夀宫提㸃孫益謙夏文永寜國路道録稽天仁饒州路道録董處謙温州路道録危有成慶元路道判麻文行世素等將以某年某月某甲子奉柩𦵏於某縣某鄉之原嗚呼天地設位聖人成能神道之教苟可以上禆爕理朝廷毎優假焉凡師之功宜在史氏顧余乃得銘墓上師實知余銘固不得辭也銘曰沕沕沄沄乃有鬼神雷風山澤與定吾真匪曰致役有精惟純是賛燮理出入天人允也陳君矯矯白雲叱咤之妙澤在生民天子曰嘉寵渥日新有賚必施以侈上仁與天為徒㒺厚厥身珍庭家山有嚴子孫其神已遷其道則存千載之下視此刻文故奉直大夫趙公墓誌銘奉直大夫趙公既𦵏之二十有二年其孤繼祖狀其歴官行事乞銘于句章任士林刻石墓上按狀公諱諒字潤之世居景州東光縣仲薛里今為寜津縣人曽祖諱某祖諱某父諱璋仕金為定逺大將軍佩銀符歴懐州都軍指揮使金法七品官子試郡令史公遂習吏事未試㑹兵興河朔事定補寜津縣吏公識度宏逺動中事機朝廷初簽軍民間户十㸃二公白長吏曰河北初定人心危疑衆未可動也下令召募願者充之不旬日得軍數百人寜津以安既而以寜津為分地俾縣擇文吏明達者一人充軍府參佐令以公應遂為軍事參謀數畫竒策出入江漢之間所獲生口全活甚衆陞為天下㫁事官經歴中統元年應詔陳言條聞利害宰相竒之為益都路七司縣勸農官時山東㺯兵民俗悍戾仕者憚之公受命以行民買犢趨耕力本知勸尋罷勸農官公亦罷明年濟南平山東東路轉運亷訪使司保公為提領淩州諸軍鄂囉事淩州西迫御河人仰水利公斂人有差貧富不侵百姓徳之俄遷濵棣路諸軍鄂囉總管府經歴㑹併濵棣入濟南公亦去職至元二年宣授奉直大夫太皇寺提舉河渡司初沿邊馬乗憧憧人並縁盜以資敵故自潼關順陳而下設八提舉司以誡以察公申令日嚴伺察日宻舟無警棹馬無逸匹凡南諜潜乗奸民造偽一無以隱其迹迨襄陽乆壘亡卒盗騎獲無幸貨軍前餉運戰艦鎧仗輸無後期論功渡江之後公宜為多然整暇素定雅歌自適作逺波亭於太皇寺西營日與碩儒太老騷人墨客賦詩飲酒而申儆司察之政不廢也在政十有二年以至正十三年二月四日卒于官至元二十四年某月某日歸𦵏于寜津縣東孟里先府君之墓兆公生於丙子年二月四日享年六十有一娶麴氏生子三人長曰榮祖將仕郎臨淮府宣課提舉司知事仲曰顯祖季曰繼祖進義副尉平江路長洲縣主簿女八人皆適名族其二側室牛氏是出孫男五人思忠以公䕃汶上縣税務大使思賢思誠俱江浙行省宣使某某㓜未仕孫女九人七已嫁二在室曽孫男四人卓兒鎻兒定兒萬奴曽孫女六人在㓜遂為銘銘曰卓卓趙公惟時之傑審機為精燭事為哲兩河之間間不容髪天子命公以詢公察盗騎逸卒為奸為黠號令既明河流活活渡江論功公豈為劣天或嗇之在政而没有勞不來有潜未發尚睠後人朂爾名閥經歴阮公墓誌銘余客錢塘乆與河北學者游行已亷隅私竊聞之至語養親有曰阮子貞其人時子貞以文無害坐省幕其親經歴公方無恙晨興問安否退命婦子具甘㫖日必易味且貲奉嬉遊以適其意晚歸視杖屨在堂則喜且拜間所歴躬奉饍寢定然後去如是嵗不懈也余甚敬之大德八年春余為上虞文學掾而子貞則為邑長於斯遂拜其親遺像中嘗語余曰余祿不及親非終身之痛乎又嘗謁予而痛曰余有民社而親在客土其寜乎然不得銘無以歸葬子幸知我銘在子矣乃狀世出行事以請余不得辭公諱某姓阮氏字某世陳留人曽祖父某祖父某襲居順天府以積善聞父某當金亡時跋渉兵間遷滿城縣買田邢家莊力生務本委心分義正直不撓鄉人化之卒無仕進意夀六十二以終男四人曰享曰裕曰瑞公其長也公生敏悟讀書輙識大體迨飾為吏事確不越矩府史書勞遂專案牘尋遷知事方今朝廷定銓衡張武烈公時鎮大名檄公充幕以亷幹稱屢赴省部白事必得請乃歸武烈誓曰苟居中進用必母忘爾賢陞順天路工匠府經歴仍權府事燕南部使者行郡亷其善以聞將俾真授㑹時更化卒拜勅命管勾新興鹽場終不就武烈公江南功成上勲勞公名在剡中力謝曰身不與事而罔功得級吾誰欺乃益自斂損閟有光華葢當天下廣大人材㨗出吾寜與争趨乎遂盡室南遷樂錢唐湖山之勝曰是足以佚吾老矣里中故人多江南重官日過門問起居公泊如也公天性簡冲學力超定故仕止有道期不辱志功利滿眼逝不求多晩年遨遊江南恬養天粹朱衣象笏子仕亦遂天其未嗇公乎公亦一笑而去不返也公生於甲申嵗六月某甲子大德六年壬寅嵗八月某甲子卒於錢唐客舍夀七十有九娶同郡王氏先公二十八年卒男二人長惟貞承事郎上虞縣尹子貞其字也次某海鹽州税務副使女一適同郡劉氏孫男四人長瑨欽山州税務都監次珪次璧從余學次未名孫女五人長適蘭溪州站提領同郡呂繼祖次適同郡王鉉次適髙節書院山長同郡李敬次適福建道宣慰司令史南宫王某次未嫁曽男孫一曽孫女一以某年某月某甲子奉柩𦵏於保定路滿城縣邢家莊之先營遵志也句章任士林為之銘銘曰衆馳則逺我控牽兮衆渉兮喧我囬筏兮仕以發身不求達兮罔功得級畏明罰兮公庭有子天未嗇兮其溉既深將刈穫兮視此銘章世有獲兮孝子錢府君墓誌銘大德八年春句章任士林既職教事於古虞氏之邦友人錢真卿狀其先府君之行泣以告曰真卿不肖先君以至孝聞將銘其事以為世訓也持此志二十有六年行逺而重吾親其在子也夫遂相持以泣曰哀哉人子之情乎余走人間十八年不忍以所不樂故遺其親懼潜行之日泯也子乃樂余遺耶府君諱興祖字國材錢氏自忠懿王始居開封禮賢宅無為府君景端君曽祖也閬州府君夀之居弋陽君祖也父節遂家上虞從沙隨程氏學館雍國虞公之孫曽守富川以盡室行而府君生生有異夣少類成人長事三山陳九達與温陵張時可辨析理學為畏友事親孝奉毋氏尤謹疾二年不愈醫藥且匱膚體不惜曰自吾毋而不得吾情吾惡乎用吾情及終貧不能𦵏孺子泣者五年既葬白鳥千百集墓木上二大鶴巡行墓旁卒百日而後去人以為至孝所感夫孝為行本君蹈其本凡所修慎信可嘉已惜其業之不昌也生於宋嘉定癸酉十一月某甲子卒於至元己夘十一月某甲子享年六十有七以某年某月某甲子𦵏於永豐鄉鳯凰山之原娶申屠氏子男二淳真卿女二適邢應博嚴漢弼孫男二德晋德朋孫女四銘曰不昌於理而昌於孝匪孝不昌視白鳥之翔過者式焉孝子之藏夫人費氏墓誌銘錢唐張澤之端而好修博而嗜文擇交當世不苟希合從周應奉趙集賢遊詩法書法以精造聞而又樂與予追尋古作者聲氣日鐫磨未置也頋予在隱約宜無以翼起之使蚤有譽於時也大德十有一年冬十有二月澤之齊衰膝行謁予西湖之上曰澤之不天毋氏終矣日月且𦵏大人謂澤之曰余途行日廹半九十矣卒不幸失爾母而余在爾固不得乆於哀為也爾情而余奪之爾重哀也必求先生銘俾以狀來請無辭銘夫人姓費氏諱某同郡安溪人也曽祖某祖某隠德不著父某仕宋承節郎監安吉州酒税母唐氏夫人生柔淑性穎悟總角鞶帨在父母側誦論語孟子知大義學李夫人書習九宫筭學既事張氏肖孫黽勉有相敬戒不違日上堂奉舅姑飴蜜承歡乃退定省温凊禮加良人迨侍疾不渝勞劇弗良履行弗憚也既殁且𦵏良人廬墓上三年家政日舉弗弛賴以終孝嵗時烝嘗必潔必敬宗姻協比戚單以愉至若口齒日繁伏臘日具一不以累其良人而鄰里遺問瓊李無虚致也朋賔過從觴豆未有餘也堂無尊章而姆媪不内接也宅近㕓市而服食常澹如也閨中不聞愠言侍婢不奉怠色而訓語温温惟勵諸子詩禮飾二女德功固其身教然也然而性慧天通日課梵典若有頓解身未四十不恥䘮具嵗必一陳而良人不知也大德十有一年夏五月初得疾外瘍且祈天曰此非老婦人證也願以他疾終至十有二月某甲子果不食飲怡然而逝生於宋寶祐丙辰八月某甲子至元己卯歸張氏享年五十有二以明年正月某甲子葬於南山之原祔姑兆也男三人長即澤之次濟之浩之女二人在室孫男二道䕶道佑夫人且死呼濟浩前曰汝㓜未知至弱未勝事惟伯兄是承以虔事父天使志業不渝幹有譽用則吾志也良人肖孫哭之哀余曰是可哀也已遂為銘銘曰澹修靜兮固天性也維家政兮固婦道之貞也事翁子兮不得終以祗也有令子兮不得飬而已也報而德兮胡爾嗇也匪嗇也天維令妻之譽而是毋之賢兮將不墜於永年以視此銘鐫也松鄉集巻三
