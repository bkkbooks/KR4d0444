body:
  text: 松鄉集卷四元任士林撰謝翺傳謝翺者字皋羽閩人也父鑰性至孝喪母行服廬墓終身不仕宋咸淳初翺試進士不中慨然以古文倡作宋祖鐃歌鼓吹曲騎吹曲上太常樂工習之人至今傳其詞倜儻有大節嘗布衣杖䇿參人軍事未幾善哭如唐衢過姑胥望夫差之臺慟哭終日過勾越行禹穴間北向哭乘舟至鄞過蛟門登候濤山感夫子浮桴之嘆則又哭晚登子陵西臺以竹如意擊石歌招魂之詞曰魂來兮何極魂去兮關水黑化為朱鳥兮有噣焉食歌闋竹石俱碎失聲哭何其情之悲也所知淪沒碧血遊空山川池榭雲嵐草木與所别處及其時適相類則裴回顧盼悲不自已夫鳥獸喪其羣匹越月踰時則必逡巡其故鄉翔回焉鳴號焉蹢躅焉踟蹰焉然後乃能去之若翺者章皇山澤惡夫涕之無從也既客浦汭往桐廬人翕然從翺學所為歌詩其稱小其指大其辭隱其義顯有風人之餘類唐人之卓卓者尤善叙事有良史材作南史帝紀二十贊采獨行秦楚之際月表所歷浙東西州佳山水必有逰記當天下廣大足歷燕魏趙代問遺事故跡且涉大瀛海外盡識風物鴻濛之初度越子長矣惜其悲鳴煩促天性固然其亡乎其亡乎士充充入矍相持觶不去憎聞翺翺自若也易曰浚恆貞凶無攸利翺之謂乎或曰伯夷叔齊何人也子曰古之賢人也曰怨乎曰求仁而得仁又何怨屈平非怨者也精神漂散鬼語神詞變而不測翺豈平伍耶初翺無恙時得唐方干舊隱白雲村建炎四年江端友吕居仁朱翌諸賢為文祭臨水之神避地於此翺曰死必葬之作許劍録逮疾革語其妻劉我死必以骨歸方鳳葬我許劍之地方鳳果聞訃至與吳思齊馮桂芳方幼學方燾翁衡翁登奉骨如志夫以死生託人不爽皎日信矣哉其徒吳貴買田月泉精舍祠曰晞髮處士嵗時奉蒸嘗云贊曰唐宰相董晉為汴州辟韓愈從事愈激知已稱隴西公而不姓晉死從裴度度乃不引用愈愈作弔田橫文以著其哀若翺者夫亦橫之客也歟吳思齊傳吳思齊者字子善婺永康人其先處之麗水父邃龍川陳氏自出大父時家焉以父任入官有能聲既老失仕恂恂為鄉人嫁兄弟之孤無歸者穀其憐之免女欲棄者棺死無以斂者意洽如也逮貧不悔有寒疾耳輒聾不聞人事懶不與世接獨婺方鳳閩謝翺睦方燾友善著老氏闕疑等書晚號全歸子全歸子生頴悟仲父監丞公天澤器其材卒授所學初父邃仕員外郎當補官謀庶兄者再監丞公曰毋廢嫡然非其志志在科目自奮故征商新城日猶樂舉子試中舉攝嘉興令善聽微决疑語在全歸子自述洪提刑起畏辟置類田吏用事者言辦此可通籍思齊曰以民怨祿非得也婦翁方饒州登為人少裁制謀以自近思齊執子壻禮不衰終不就其有守自立如此賈氏方柄國上將以鹵簿臨其母喪文侍郎及翁言不可然畏禍中悔思齊以書朂之曰叱嗟而母婢也公不可默已御史俞浙以論謝堂出臺為太府少卿留丞相直堂有勳籍思齊以書正之曰公宅百揆以貴戚廢公論世誰賴乎其自強敢言如此惟自強故不以貧屈惟有守故不以勢移屈且移則終始相渝或虧其中以取售其能以全歸乎或曰人事通塞昔智今愚常逢其故也何全為是不然兹其所謂全也山林川澤之間引若人以自媚如橫空之參耿耿生白察曙色者有徴惜乎其自閟者深其根於逺者不宏也詩曰雖無老成人尚有典刑子曰善人吾不得而見之矣得見有恆者斯可矣及觀俟命録斷自孔曽以下死生瞭然貞矣哉贊曰余識謝翺得其詩以唐杜甫自律翼以二李其傳乎遇方鳳道謝翺已死葬於釣臺之南與方干隱相望言且於邑泣下出所書全歸子自述至曰天奪炳燭之鄰畸窮孤危如鼎一足悲矣夫其以古道自信者夫烈婦胡氏傳劉平妻胡氏濵州渤海縣秦臺鄉人也既筓適平生子男三人平從軍有材名至元七年戍棗陽平在行中既戍乃閏月六日平以小車載婦子往時長男不從中男才七嵗小兒在抱未十月胡前挽車平後推之未至棗陽西北百餘里沙河之滸日入繫車木下宿焉夜半虎來噬平臂負之去平號胡徒手從之力掣虎足中男拔刀室中走以授母胡得刀刺虎肝腸盡出虎始脫平平尚能言懼他虎來不勝乃捨車扶平挈二子涉河而西至季陽堡南門叫欲入門者驚懸火下燭見衣血淋漓猶信為置門下遲明白其將趙侯命戲下卒往致所棄車載死虎來歸為召醫者視平藥之三日而死於是趙侯上其事棗陽帥且官納虎皮給鈔十千以瘞平八年十月胡以二子至自棗陽濵州長吏訊之圖其狀以聞復其家任子曰嘗讀詩至大夫行役室家憫其勤勞莫不有自貽伊阻之嘆則胡之從戍也以情及其遇虎而脫夫也以烈方胡之掣虎而剚刀也知有夫而已兒之拔刀而授母也知有父而已虎雖暴豈能嚙天倫之衷哉泰山之哭夫子哀之至矣余讀張維此傳因為序其事書於後云自然道士傳自然道士不知何許人也薛氏或謂系出軒轅夏車正奚仲成湯左相仲虺之孫薛其先封故云生淡泊有趣尚自謂羲皇上人與倏忽氏鑿混沌有功將第而祿之適華胥氏事廢而户外之屨滿矣文王居美里箕子釋周縛周公東征三年歸孔子自衛反魯講承逺詣直窺河洛晚侍孔子問禮老聃得自然之道因號自然道士改自然處士非其志也題所居曰瓦注軒尋號瓦注居士周茂叔邵堯夫程正叔日遊從神領意㑹與道翁張遂僦居孤山之上亦號孤山賃房翁蔡少霞山𤣥卿葛稚川司馬子微陶貞白相與吐吞明月宴嘯清風時未嘗不神遊崑崙也坐輕泄𤣥理左遷聽鶴翁而出處去就之間裕如也志有專業更無定名亦順乎天而已矣然涉世方長信道方篤名不一更而可定也當無寵辱之驚乎真一先生傳真一先生家姓釀名字伯醇無功鄉人其先秫有國神農時黃帝既致杵臼之利陳師伐其國秫以俘見帝不忍播棄封之為太倉令崆峒牟氏聞秫賢有立志以女妻之秫得牟喜曰此真吾糟糠妻也生子㫖禹㑹諸侯於塗山有儀狄者以㫖進禹味其言甘曰吾子孫必有以是亡國者心疏之然亦不斥絶㫖生泛泛生醴醴生盎盎生緹緹生沈仕成周為最盛朝廷宗廟之上咸相推尊下至比閭族黨升降酬酢莫不有禮遭春秋歷戰國子孫以詐得幸諸侯獨商以清德聞齊威王時淳于髠以滑稽受上賞而商去矣暨至秦漢商之族通顯然官不過主爵都尉先生其𦙍也晉桓大司馬辟先生為青州從事志不屑雅與阮宣畢卓劉伶阮籍之徒為忘形之交義熙間先生抱甕自閉不希薦引㑹五桞先生陶元亮棄官歸柴桑與先生交歡凡戚欣歌哭平險逆順之塗必揖先生商之元亮沉浸醲郁先生亦風流醖藉莫逆於心元亮嘗坐東籬下望先生不來唇焦肺渴心甚苦之㑹王江州遣白衣人送先生至元亮為之傾倒殆盡先生時枕藉糟中為浮蛆所困元亮脫葛巾手自引撥笑曰公等碌碌所謂因人成事者其愛嗜如此元亮晚年多感山陽下國之事令人酸心遂有瓶罄罍耻之憂失笑相顧舉口見疑作詩戒止思與先生絶交先生仰天耳熱撫嶽而歌烏烏曰知我者陶先生乎罪我者陶先生乎退而守口如瓶不求爼豆賢人之列著書子壺子以自娛後趙郡蘇軾追尊之曰真一先生太史公曰家氏散居天下而釀以醇和稱大白若辱不沽市井之譽其聖之清者歟自羲叔和叔以來愛嗜釀者甚衆惟晋陶元明最為浹洽然而酬酢之情不能白首君子惜之彌子之賢未變於初也前見賢而後獲罪者愛憎之至變也釀之於淵明亦愛憎之至變歟世之所謂醇酎交者可不慎哉夀光先生傳夀光先生古鑑者西蜀人父同嘗輸作尚方其母范氏夢明月入懷同曰此竒徴也吾為爾成之後遇祝融氏爐中得煉養術神光滿室彌月不散果生鑑鑑生未有識察㑹負局仙人從代來見鑑竒曰此不迎不將應物而不藏者乎命以金膏塗頂玊水洗胸鑑遂光明善照人無妍醜皆愛鑑鑑亦不少假借毫髮無隱對之者衣冠必肅武帝初待詔建章宫帝將御冕旒朝羣臣召鑑侍帝改容臨之賜錦裀玉匣進為玊臺郎時方置大長秋以鑑賜貴人陳氏陳氏得鑑益自修飾儀容絶世遂册陳氏為皇后后受册已謝曰妾待罪後宫不能自媚陛下以鑑賜妾妾膏沐必對鑑令妾以色承恩鑑之力也乞封鑑如儀乃封鑑容成侯賜錦裀如故后立十餘年挾婦人媚道覺女子楚服棄市相連者三百餘人賜册皇后上璽綬罷退長門宫鑑懼毁求容平陽主家謳者衛子夫善鑑帝祓灞上還過主家所侍良家女皆不悅獨悅子夫得幸軒中入為皇后后不引鑑不敢侍上上知鑑能飾后容出入不疑加賜五龍五綬后立三十八年與戾太子擅發兵誅江充朝廷大怒執金吾劉敢奉册收皇后璽綬后自殺帝乃制詔御史容成侯鑑克明喜飾號為察物後宫賴之然二后實危余而鑑不察反飾置之雖好色必惡心朕幾中焉夫能察人之形而不能察之情能飾人之容而不能飾人之心容成侯何以自明遂廢棄民間晚號夀光先生太史公曰古公亶父周之初也鑑豈其裔歟胸中不正眸子眊焉鑑豈不善察者飾置之過帝甘心焉以貌取人罪鑑誤矣送鄧善之修撰序文章之尚緣時而興時有淳龎則文有隆汙其勢則然也亦固在夫操制作之柄者與道消息與時翕張于以風示當世然後學者一趨於正也且六經述作如日星昭布如四時錯行渾渾乎山川之流峙也挺挺乎草木之華滋也何其渾厚而博大倫理而音節也千載之下讀之者油油然雍熙渾皓之盛如親見之至若莊周之荒唐屈原之沉鬱蘇秦張儀公孫衍騶奭譎詐之談商鞅李斯韓非申不害慘礉之論以至荀卿揚雄醇疵之作東方朔司馬相如恢詭之辭何其披靡而支離巖嶄而澎湃也百世之下覽之者薾薾然破碎磔裂之風如新沐之然而操觚弄翰之士寧為此而不為彼何耶往時科舉事具人方以言語相雄長文字第甲乙不旁搜以為竒逺引以為博鉤致以為深有不可也今天下一家元氣渾合大聲洋洋朝廷之上躬行古人而右文之治四海風被山林之遠時及覩播告之修紀載之作詠歌之章渾然典謨之溫潤風雅之清揚將作為一經以襲六為七何其盛耶友人鄧善之歸自詞垣與余劇談西湖之上觀其渾厚以和沉潜以潤如清球在縣明珠在乘信涵養之深而持守之純也嗚呼質乎文乎若循環乎盛古之風躬行之治歷數千百年而後振乎則夫操制作之柄者得不有思乎宜非枯槁之士果所窺也八代之衰退之起之五代之陋永叔弛之百川東障狂瀾靡之故其為力也為甚難今時則易然也善之勉乎哉天風萬里將還玉堂之署幸為我謝諸君江海之迹倦矣得無戀戀盛時乎張仲實教授宜興序僕漁釣海上嵗時過循王之廟且式衣冠儼然有生氣固知世祀未衰必有聞孫譽士出也數年來杭聞仲實之門凡師數十生皆公卿材子弟凡江海士仕者問業遊者問舍所出詞章日益富為世所珍嗜不輒去手僕誠私心慕之今年春復來乃聞仲實教授宜興行有日矣僕自念飲沐其先之故耳接其人之賢名不在謁者豈情也耶明日仲實乃過僕意氣言論溢所聞且慕逺甚又明日楊仲宏來曰仲實且知子矣將行子不可無語僕聞之士一命而上皆有王事唯教事故為最優然聞諸仕者莫不勞且悔以去夫士有教事而悔且勞如此豈知方之士乎蓋士處窮約時廓其庭以受諸生甚尊嚴且優遊洋洋也舉莫以違其意逮名在下士諸生在前吏議在後怠者教不足弱者事不足勞且悔亦宜也仲實少長勳門壯食舊德溫乎璆琳琅玕之美具焉充乎夏瑚商璉之器列焉故學有泉淵唯飲者取足文如宜膳四時具詳於味者日絮且啜是優於教矣况器識以迎事之來聲實以括人之譽宜將大肆於時也胡寧日有砥礪繩墨之事於州千里之地乎仲實行矣送俞時中北上序俞時中將行友人餞之北門任士林執盞言曰士有襲家學以為珍負材識以為文其氣充焉其聲先焉然而仕循循進無異常人曽不得超趠寥廓而窺光天衢豈天下廣大以名進吏部夫人而能為賢乎將蟄爾聲抑爾氣不使激昂於時以一于格律之公乎抑道塞仕薄未嘗日造中州上國屈折王公之前拜自獻以成其身乎不然棟梁者未之收而桷榱之用將無自而振乎今之世雖多賢不能蓋子也亦明矣而子又非蟄爾聲抑爾氣使不自耀者則餘二者為之決矣然嘗觀韓昌黎氏作張籍李翺之徒遂亦名世然蘇氏之聞亦待歐陽子之門而大吾起視江海三十年無科舉事負材抱氣凡可為張籍李翺者不少夫果誰為之宗依耶蘇氏父子雖不迄再見而振動其聲耀使天下士皆願出其門有如歐陽公灼然復可見乎不也吾固不得而窺也子行道中州造上國拜自獻以成其身將亦子之恥也仰視清列棟梁者收乎豈猶曰未也則子具桷榱以進夫猶曰需之吾不信也劉梅泉松江教授序漢郡文學選至重也非經明行修者不與焉雋不疑蓋寬饒諸葛豐之徒何班班如也逮宋慶厯路州軍監始有學置教授或曹掾兼之或州里推擇則轉運司命之也熙寧中始自中書門下逮厥後選益尊法益詳其途有十謂之十色教官夫士自束髮至白首﨑嶇場屋間迄一第於有司僥幸出是選者則以不拜吏部為榮以脫身箠楚為賀其選豈不甚重乎今科舉事廢上之人擇材於鄉里之公郡博士考所業而進之部使者加考核焉縣教諭由此其選既而分録糾正郡教事由所部升之省加詳察焉而後畀之如是十餘年始克問選於吏部間關萬里風雪滿塗而狐裘為緇獲觀上國之光者幾何人而老者病者不在焉吏部定天下選路府若州闕有限而考有期來日多而應日狹不知嵗月之坐困也蓋橫一經而坐皋比部使者以為僚二千石以為客書生之至貴不惟朝廷甚惜之也二十年來人之取富貴甚易故視此選為甚難幸而得之傲兀重席以意氣使諸生蓋將酬其所甚難而圖其所甚易而不知自漢迄今其選為何如耶又安知薾然衣冠進退為館下生者不已試其所難者耶劉君梅泉將行松江吾故道其辭云程氏受義堂詩卷序鎮江路府推程氏其家以義名堂曰吾有所受之也凡能詩者賦之若干篇皇甫生求余序其首固將以為教化風俗美事余惟人生同氣之身散而兄弟繼别繼禰之所由分百世之所由集義之所由始也夫仁義禮智具於性而命於天命於天實由命於親也孟子曰仁之實事親是也義之實從兄是也即事親之實由之以從兄弟之間皆天性之所由發則是義也父有所不待授子有所不待受油然孝友之行始于家而逹於政豈必諄諄告語然哉而世道日趨家俗日靡交相愈而不令之情作與人恭而獨亡之嘆興甚而風雨流落義不在姜肱之被矣春風枯榮義不在田真之荆矣此程氏堂所由作也府推公事其先大夫日凡怡怡仲季之間者則既聞之矣大夫既殁府推公獨忍死其親乎是故羣從兄弟十有三人同門以居同堂以食仕不私祿事不怠長井井熙熙前塤後箎左芝右蘭詩書滿闥大紛小帨鞶絲成帷一真天遊罔間內外室無私評幹有譽用詩云宜兄宜弟宜兄宜弟而後可以教國人府推公有焉則夫聞程氏之風者可不愧乎余故樂贊其事而序以歸之瓢湖小隱詩序隱者之道有二其身隱其道為天下後世用而不可泯也其心隱其跡在朝市進退間而不可窺也若夫生江海之上老耕釣之間無卓絶之行以自異無𢎞濟之道以自聞而徒區區行怪者之歸則亦胥而泯泯然耳隱云乎哉然而談笑之侯無世無之徒步之卿相無人而不得也則夫智慮宇宙之外精神塵埃之表琴書以自娛詩酒以自樂偃然世故之不得凂獨非隱者事乎東山謝氏子居坳塘之上名之曰瓢湖小隱賦詩自况諸君交和之夫五湖之廣而納之一瓢之小一世之紛而坐之斗室之安非隱者不能也余來華亭不及識謝君而謝君之所交遊能稱之且求余言為之序嗚呼余六十翁矣跡不一趨利祿之途而心未嘗往也然尚曰吾隱者吾隱者人不謂信也今謝君力足以致休譽材足以起榮名而俯首田里之事若甘心焉非隱者之倫乎他日天風雪晴扁舟獨往叩門不及而返顧相與成隱者之風則非人所識也因書其首云劉思魯侍父之瀏陽序鄜川劉汶侍其父之瀏陽教授翰林應奉周君景逺為次餞者之詩必求余言為贈自豫得楊仲𢎞人方翕然從豫後得師魯而人益信豫將托二子以自朂也而思魯别豫是不可以無言也海之於水所受者大故其為濤也怒以泄逮其平也人狎之濟以漁木之於地所培者深故其為幹也怒以長逮其久也潔百圍人不驚異時科舉事具士薾然文字之間師友以持其成公卿以震其聞有司失得以摧其鋭而又嵗月以老其涉有不索然者乎今舉無是困也氣安得而不充乎視向之薾然索然者可熟視無覩也夫年以養學學以養氣有充然之守而待之以薾然索然之容胡不觀之海與木乎濟以漁者狎焉潔之圍而材者取焉未見其薄於發也然長沙多沉鬱之士感憤悲鳴氣不能輒平吾師魯其廓受之深出之以道御氣輸之和平之音則淵然之學鏘然之文吾且避子矣三年將拜君賜送揭陽趙令君序仕猶農也以既穫為能事富貴猶射也以既中為良工天下每以是求材而鹵莽之耕詭遇之獲不計焉夫出處有時仕止有節父兄之教成而素守之天定造物者不振耀之則善者懼矣前揭陽令君膚敏士也始集賢公宣撫四明郡以佐理有功起家為揭陽計凡最也揭陽在南海徒以老母故不能行既而集賢公立朝著令君不敢以見亦不敢以仕躬孝友之節養亷退之風則集賢公之心也集賢公薨朝廷大振幽滯郡以名聞部使者加察詳焉元嶽大臣將進之聖天子之庭令君遂有仕意而貧不能為萬里資也蓋自清敏公盛時退然一書生紈綺之味已薄於今為庶祝融回祿相之始不得不仰升斗之祿使集賢公無恙上被聖天子之知令君而求多於造物則仕傷亷矣今天子仁聖盡擢豐芑之材而用之令君而自棄於明時則不仕傷義矣令君生清敏公之門最晚而受教集賢公最深集賢公活十萬人命而天不富貴其子若弟吾不信也令君不濡忍二十年之久徐起而收之則集賢公之心不白而仕止之義不明令君庸有道乎秋風載道走公卿間有不以豫言為信是不知集賢公者也令君行矣慈溪主簿茒意山序士有首功而不遇志有白首而未酬造物者固將老天下之智慮而悲歌慷慨之士之所甚惜也意山杭人也受檄行軍更封傳來四明郡户口厄塞遂入職方實至元十三年春也集賢公被命宣撫置君幕下既而歸奏天子凡帷幄之賢一時出籌畫第功吏部意山遂青衫拜命實簿正慈溪縣事爵之卑恩之崇也意山不以寮底自詘苟可以行吾志長官不能撓二千石不能屈邑以治聞民不忍舍去因家於苃舍之下而貧如故也嵗事棗栗熟坐長老立童豎杯酒相煦勞教民出租稅奉期約射狐罝兔以為歡如未去政君之薄民之厚也今將以名上銓衡若不勝萬里之役是懼嗟乎功名危事也富貴厚報也首危事而食厚報綽綽然左劵之得意山退然不伐而人以為已功不亦愧乎試吏百里近三年有成政循序取一官以幸妻子可俯首拾方將處民伍如素編列豈獨無利祿之心乎吾聞集賢公之門多退讓士富貴狎來智者䇿殿造物之術窮而道德之味勝意山不得濡染之深則性具固美也其亷於取也亦宜三飧蒼莽挾此以有行不超君於拾級連步之外吾不信也意山勉乎哉吾北鄉望君矣送樓平隱序司馬季主嚴君平卜以隱其身者也然卜非隱具也以名致人而利其求以禍福中人而利其得卜隱乎哉是以季主君平以卜特聞且十日十二子相配五行相休王所以貧富貴賤夀夭天下之人不能竊竊然知也知亦未易也卜始神矣是故遊天下之藝以自卑非隱者不能也神天下之術以自利則隱者不為也能其所不能為其所不為未可以言卜也矣夫人生於隂陽寒暑而乾坤坎離之妙語之而不能對食於粟米絲麻而木金水火之用叩之而不能解何也大抵本末精粗之學不明卜者始専門而道行矣異時科舉事具朝而平康之遊子暮而殿陛之句臚其通塞固不能識也卜者之門愈盛而道愈隆然世亦以是而衰也今樓君淳甫將以卜聞而隱其心也為我張簾大坐閲市人之富復有飯牛牽狗者乎子盍擲卜錢而謝之曰六經昌矣送葉伯幾序余家越天門山之陽坐瞰海波水天際逺蠻洲蜃嶼歷歷晴豁時則天光曙發風濶潮平舟大小淩蜃頭來杳若撒菽少則帆影抑揚棹歌出沒徑列步下市儈布立岸上遙呼問海伴故舊三老倚桅長揖載輸委市廢舉畢問且悉對然後乃登岸洋洋入市儈家揮霍醉語無誰何明日椎羊瀝神擊鼓召市販夫日來爭貿急售幸不幸聽軒輊唯淺深賴不臭厥載為賀既又涉旬月市儈計觚籌然後審知乾沒則莫不大呼起柂列嘯揚帆視厚薄各滿志去又嘗觀富人之舶挂十丈之竿建八翼之櫓長年頓指南車坐浮庋上百夫建鼓畨休整如官府令拖碇必良綍繂必精載必異國絶産時一上步綱孔目大小殺牛釃酒暢歡而後去市儈過不敢顧蓋將輸官場之入保天府之珍者也余在隱約猶為學校諸生每見職教者充孔楊來不險濟以求贏則幸不幸輸爾載以愜入者也葉君伯幾之至也未數月也以下州例不得設學録故去然其深藏而不賈厚載而未輸大類富人之舶不入市儈之顧以滿志去者固多矣叙以道其别送周應申遠遊序志逺業者不家食而肥毒宴安者視鄉鄰為狹夫人之情則然而遇不遇天也植杖之士不能易滔滔之津荷蕢之徒固亦議有心之磬是非茫茫然枵其中瑟瑟然囁嚅其外者所能有獲於世也然王矦之門首據者為上賢江海之上眼空者無後逹是以媻姗而進堂上之美人皆笑首彈鋏而歸坐上之主翁無棄責置莝豆於下列綈袍之情亦危在術中而不悟問舌之恥仍在如是而遊於世將何獲乎吾嘗折肱於是矣兀兀出踵息且將尋山中遂初賦日以自察周氏子應申乃欲軒軒然逺遊應申少學於余不得自隱其底而以告之雖然命蹇者滯來心通者巧至生聞余之所已歷能不少失色於人則其獲也詎可既乎雖然旁坐市肆而竊笑不言者宋大夫之儔生勿以言卜也過市滴油而百錢必中者小由基之所屈生勿以言射也池鵝可籠而拊膺之婦已切切然不能平石鼎可賦而楚喉之叟且啞啞然相迫切生其慎哉稇載望生矣杭州路三教人士送監郡序大德十有二年春二月六日杭州路逹嚕噶齊通議公三年政成解印綬去杭父兄候公騎上道相聚成列稚弱纍纍耆耄種種或卧道上或控馬首泣不聽去曰公政慈我公恩遺我父母育我顧我復我我渴飲我我飢榖我公去輟我誰與活我言泣欲下又曰公留我嬉公去我悲我悲謂何我糴我飢泣且哽又曰浙江東來流民哀哀道饑誰食道骼誰埋公亦掩袂為不忍去曰我曷能政命由上令我曷能慈恩由上施天子仁聖前星令明我叩我首我陳我情俾爾毋爾病俾爾飫爾寧以熙爾城於是三教人士杜道堅等出謝父兄而為之言曰郡之民命寄在牧守牧守為政莫切杭城蓋以數百萬之民一仰糴于升斗水旱之餘居富者不知政居官者不知民民與政交相病也是故心太切則政煩心不一則政瀆令出未孚而督者在道惠施未均而核者在庭奈之何其為荒政之道也公一誠明白百舉具修上不諂逢下不威濟此政所由成而民所由懷也然而政有切而未陳事有弊而當極公上下智慮間懷之久矣今將日造帝庭都俞吁咈之下凡大而天下小而邦國一廣利澤之仁則公去之日猶在政之年也爾父兄其何悲於是公乃上道遂述其辭以遺採風者得焉南谷原㫖發揮序人不可以不知道夫道在天地之先兩儀以之分人物以之命率而修之而世教立是故即世教以求道則天地不可知即天地以窺道則其初不可究夫孔老立言其率而修之之謂歟其所以為言則極初在其掌歟河南邵氏發䝉於堯舜數千載之後而灼然有見於天地未開物之前故以元經㑹以㑹經運以運經世繇十日十二子相配為始少昊之星癸繇少昊而上凡古始之事可溯而知其故其原曰自老子南谷杜尊師既著道德經原㫖且即邵氏書為原㫖發揮老子曰能知古始是謂道紀此發揮所由作也或曰身遊形器之域為爾渾淪之言不亦戾於道耶應之曰生民有始天地有初道不可以有有而無無而渾淪之與居乃可以知此也夫他日著筍皮冠衣布單衣執老子以居青山白雲之下則庶乎其有徴於斯云送括蒼王實翁邏戍公棠序往年余留鄉邦識王將軍於長吏之庭時將軍有事邏戍於連山隘中車笠迎逢弓矢先後而退讓有禮言溫溫以和儒先生爭譽之未幾以滿去山谷之民出餞城市州長吏益以敬士益以譽民益以祝曰苃舍猶在越七八年遇余錢塘言貌猶往年之見既而以復戍公棠别余曰人生出處良難如蟻旋磨十年之間調不改選仕不改州公棠有戍實鄰連山苃舍之祝云吾愧也余為之喜曰居有故僚鄰有故壤君何愧乎惟其愧愧是以不愧君何愧乎公棠在丹山之崖赤水之涘連山在其南漢有鎮亭亭有長故宋有公棠寨寨有邏戍既而連山以險陋聞故公棠連山始分戍水入剡山入婺女㑹稽民散居山谷中以採植為業梯石為田淡食薇蕨死不越市故其俗易治君所嘗試於連山者則既聞之矣然奉化有千里之寄守邏戍六軍戍二所以坊民之至矣矧時平致治民有不必坊而日赴期㑹之約州一小卒吏入墟落芻米之所需酒漿之所奉雞犬之厄有不得而免矣故邏地之胥不濫出醉語即不足以支兵不削食割飲則不足以承為之長者雖欲靜為守簡為理不可得也君行首以余言為牧守告然後居君之敬行君之簡以與夫山林儉德之儒受學問道暇即上鞠猴摘青櫺詩筒酒斗相從山水之下嵗時與爾民短衣晝獵山核充籩野味崇爼以歌舞牧守之治固不厭弓刀之為屈也吾將賀君之有成其愈於連山也固宜諸君餞之詩余因序其首云中易序大哉易乎立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義如斯而已矣是故在天成象在地成形聖人設卦之宜也化而裁之存乎變推而行之存乎通神而明之存乎其人聖人作易之㫖也易乎易乎彰往而察來鉤深而致逺原始而返終其幾神矣子曰舜隱惡而揚善執其兩端用其中於民此之謂也詩云鳶飛戾天魚躍于淵言其上下察也然而子思沒中庸之道不明而易隱矣余生千載之後獨抱全經潜心研思亦既有年然後豁然始悟天地之變化人事之始終作為中易分為上下篇三陳其卦所以極河洛之數成大衍之用體天地之撰盛德大業顯仁藏用一本坎離頥過之妙既未隨蠱之幾井噬賁困之感屯鼎革䝉之推聖人通變立言之㫖粲然甚明格物致知正心誠意修身齊家治國平天下之道盡在是矣可不究乎子曰天何言哉四時行焉百物生焉天何言哉此夫子之所以為聖也送徐春野蘭溪吏目序州千里之地建其牧有長有二而案牘之寄則有吏目所以達民吏之情而受成於長二者也事之然不然可不可長吏不得獨决於上必於吏目折衷焉於是獄訟簿書始於吏手之擬度而成於吏目之筆削非心貫格律性融理道吾未見其能濟者也往嵗錢塘徐君贇夫來綜吾州吏事紫髯裘馬儼然儒者之政豫嘗為其作幕中壁針有曰上交不諂下交不瀆徐君居之無倦故其去也如始見豫錢唐久君復為蘭溪之役且别曰今何以贈我豫曰舊言在也夫人諂則直不舉直不舉則道不行瀆則臨不莊臨不莊則令不從語人以諂與瀆則忿然怒怫然辭而終身諂人也終身瀆人也徐君處上下之間不諂不瀆終始以之於從政乎何有前二車郭使君以亷明聞於時今苃舍猶在君往質之且曰江海之舊有任某者祝且規如是當必可吾言云重陽王真人憫化圖序重陽王真人憫化圖凡五十有五李真常實為之張誠明遂為之題其目吏𢎞真為之傳其事王資善為之序其然何竊竊然如也蓋憫一世之窮相率而期於化此圖之不可不作也然吾觀重陽之為道也如月在天如風行水其神凝其形化何往非跡何往非圖逮雲行月移竅虛風霽其神遷其道傳何有於跡何有於圖乎哉果且無跡與圖乎哉雖然易象何為而作也忘筌忘蹄必有得是圖之外云送吾宗瑾之江隂馬䭾沙巡檢序瑾與余同姓學業於余精悍有膽氣余嘗語以本末精粗之道固知其疏敏有用材也既而同年祗命省户俱為縣文學掾講學之外獨能與諸生相周旋既用譽以去當上銓其翁府判官以年老宜傳法應補邏戍復祗命以行奉其尊府君之言别余錢唐曰瑾不肖不得卒業門下而習仕庠序間吾愧也親老矣不得奉菽水堂上而俯首刀弓中益吾愧也先生可獨以無辭余曰余知翁固以翁之事告夫翁以盛年上第適弗逢世逮授秩六品復不及祿退居三十年推之挽之皆當世有力而翁獨恬然不遷因使其子先庠序之事且曰勞奔走而後食其何亷於造物也如是亦固自其心不忍貪天之功始也且富貴利達命於人而實命於天命於天者天遂人命於人者人遂天以人遂天世固優之矣而翁弗歆也以天遂人翁獨自之而子得辭之乎而况功業之見於世固無久卑屈理乎子行其以而翁亷於造物者為深訓以富貴利達人遂天者為深懲然後出所學末者粗者以日奉其役本者精者以日深其受則獲乎上也為有道施乎下也為有宜吾將日子之望而翁之心也子行易體用序為保八侍郎作易體用者二卿保公所著夫易之為書廣矣大矣而羲文周孔之心千載而得其解猶旦暮遇之也蓋易之為道逺而天地之始終近而一日之旦夜大而天下國家之經綸小而一身之進退得失體而用之無不在是故舉理而言神明通矣而遺於末也舉數而言三五成矣而離於一也變化見而觀象者求之則囿於物矣吉凶生而尚占者玩之則梏於徴矣夫然則體之吾身措之日用而後簡易之理得此體用一書所由作也然嘗論之卦有六十四而易不止於六十四爻有三百八十四而稽其情通其事又豈一爻一辭之所能窮哉今觀二卿所著猶不免於言下有言蓋離言則道不明離道則言不成言與道交相涉也而後體用之學行觀二卿之易者當求於言之外云雪竇淳上人求施大鐘序行禹穴而四明山為最勝俯鞠猴巖出二十里遂有雪竇飛瀑千丈激雪跑空玉乳金沙時一發露人緣蹬而上如行十里許盤回折伏若已窮絶至其上則廣田平衍可數百畝有竹箭杉栝之饒竒峯峭壁髙入蒼莽如來氏結廬其中逮明覺大師道行東南雪竇特聞宋仁祖在御嘗夢遊其山故三數名德趺遊之遺朝廷敕有司視窣堵具然後窆地由人勝如是乎寺更劫灰以來前石門來公措理其先今野翁同公紀畫其後殿閣堂廡庖湢之區幾數千楹而後大備鐘樓視寺尤壯翬飛翼跂與山俱齊而縣金未具殊為缺事於是召匠計金錫之齊若干萬斤于銑鼓鉦之度厚薄侈弇之宜厥有成制奈何弗給一日野翁方秉拂坐召常所辦事而進曰官府坐曹以鼓為節故示民期㑹由聲而出幢剎昏旦以鐘為令故示佛知見由聲而入諸袍住卧於此鳬氏之工獨未究竟何耶朴翁淳師藥巖是師合掌前曰公卿富貴之家食施宴常如五榖邁種穫於既耰名山大剎資其利益者亦宏矣固有聞雪竇而未遊遊而且未忘者寧獨無心乎疏擊不出山故願施者亦不緣遇寺今二十年斤斧相尋六殫矣嵗所入不足以飯其徒之日來而暇鐘乎請扶疏以行乃告其事常與遊某聞如來氏以道覺天下故縣金為樓所以動夫人之耳而聲聞為近道夫施出諸心隱而不可測逮著而入物方可俱達人其容有吝乎二師行矣松鄉集卷四
