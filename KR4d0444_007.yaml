body:
  text: 松鄉集巻七元任士林撰書太常卿孫静見文集後右孫太常詩文若干巻其子凝出以示任士林將授之梓以行世也某嘗讀庸齋趙公所作夫子衢州家廟記知公治郡日為政固有本也况徐徑畈為之民梁子竒為之客實踐力行之學所以施諸民事而措諸文辭者者宜有徴也至於凡立朝凡持節迨為京大尹殿陛之吁咈廟堂之可否與夫當世儒先生之往復辯論下至郡諸生日講説鑿鑿然理本之言豈操觚弄翰者所能窺也尚惟舊史散亡新聞未有攸繼吾扵前修筆墨之遺宜可服而習之則其行逺也固宜遂書以還孫氏跋史文靖公遺黄司户襄閫書後史文靖公所遺黄參軍真文忠公之徒也語其才力宜非永國所棄第失其名字不知終身所到嘗備中朝之用在當時所䟽否抑不知驅馳幕府之間如近世謝叠山所追惜否起公論扵百年之後此帖不無感云題劉忠公諌草後清議有益扵人之國乎世無忠公一䟽則父子之道幾絶壯矣哉然淮蔡功成舊恥亦雪衮衣初歸處置未定而其人竟失終身之節天乎吾固惜其材之未盡施而忠公之氣則已伸矣書大魁宮講方公墓銘後往時士大夫之對在廷輒得正人起公論扵異世庸有賴也余感泣久已友人方叔敏出其先宮講公墓誌銘且示甲子發策懇懇除舊布新之事當時以為不祥卒一校書郎以殁惜哉彼選居其亞而寵數起凌卒為歇後鄭五僅免為亡國之辱亦何補哉然公唱第日慨念其父南安府君名在甲科不出七人之列孤能不以首選為驚乎故九賓一呼而涕泗交下自闕廷至期集鞭絲帽影終為之不懌是固不樂扵逹以越我先人夫亦甘扵斥者歟此銘筆之遺者俾刻之碑隂云考亭先生聚星屏後題天地之精鍾而為人賢者其秀也故其精神流布上著扵天星象不能隱其徳傅説之傳不可誣也今夫使入蜀客近帝列雲臺隕營中中台少微出處生沒信而有徴則夫陳荀氏太史之奏固未可辨其為誣也然嘗觀太史公天官書景星者徳星也其狀無常出扵有道之國劉氏季世金火罰星揚光天廷俱入房心襄楷憂之矣漢事為可知也潁川入房一度胡寧而有徳星之徴乎二翁徳瑞世二難八龍賢足以挽漢之回天象固為不誣而漢事終可知也則二嬰抱車中坐膝前玉雪可念固豈為曹氏出乎人心誰獨無漢也非曹氏則不足以大芘吾民二子材略亦非曹氏不用二子豈㤀漢者哉世事固至此也吾觀二翁徳宇恢大非沽激取福者比教行乎二難八龍未有過舉雖二子有不掩衰世之質固亦人材之傑太史氏知星乎哉碭曹士開氏其先𦵏太丘嵗時過墟里夢寐名徳未瘳也行閩越間得子朱子所命市工考亭陳氏聚星屏畫初本後有答鞏仲至布置未安語好古好其人好畫好其意云書方師魯文藁後余少時喜作陳思王小賦自謂文潜軰相頡頑然終不能進矣至若子雲相如之作則矯首歉然莽不能窺材力正不侔也讀師魯瀑布賦鎔意鑄辭浸淫乎二子亦竒矣余甚愧之迨其詩若文則汪洋演邐平波千尺時有蜃鱷之駭使人神悚目移向若不進終亦獲其恬霽也盖師魯上郡計時有翁校書公方擢大廷第一親聞理本之言亦浸深矣題劉竹居四覺窻詩後世人生死夢覺中而不察也故逹人以百年為一覺上虞劉君竹居題寢坐之室曰四覺窻謂一日之間夢即覺覺即夢夢亦復覺覺亦復夢如是而吾事畢矣然翁履人世今九十年矣凡幾夢覺耶不知所夢何適所覺何喻也翁笑不言且食蛤蜊跋黄秋畦自書墓誌後老畦翁閱世熟矣獨死事未有所屬手為誌文以遺其子介亦逹矣然東坡嘗追誚劉伯倫以為未㤀骸者翁亦當一笑云跋中不倚所藏呉傅朋帖王逢原遺腹女是生呉傅朋書法固有自來此帖往復殆小乘僧之流非髙蹈大方者也不倚文字外人乃能寳之扵百五十年之後豈徒玩其筆墨之精世之人以殺為戲以業為果觀傅朋此帖非榮之良砭歟書蔣定叔詩巻後金虎呼泉科舉事廢耳目明逹之士往往以詩自暢然有詩法有句法有字法森嚴𤣥䆳未易入也定叔白首呻吟發情止義其有得扵詩法句法字法者乎不然則山之選何居定叔嘗次先人詩一握美家林今其子復能次定叔之詩獻聞當世抑亦不匱之孝詩云乎哉書唐人集句後活剥張昌齡生吞郭正一昔人所譏也自王介甫石曼卿始集古人句為戲孔毅父遂刻意為之蘇子瞻已不恕矣近世百家衣盛出能不無天呉與紫鳯顛倒在裋褐之失耶某氏子新意如硎久事㳺歴使能原性情之感知禮義之所止儒先生當避閥閱如搜掠未窮鼓不足而諷席雖李商隠之祭魚楊文公之衲被祗見其勞而發亦止耳名山大川清氣未歇其必有以語之者試挾此以行羅國賔竹西巻後題竹扵秋為最宜其萌其篁其操凌雪霜而不屈竹之致固不一也今夫金風有聲玉露垂液而竹瀝然視萬物變化殊無隕穫之色至凌雪霜而不屈勁而充其操者也臨安羅君明經家也視萬物時有秋事植竹西塢以觀其灑然者勁然暮色蒼然爽氣在袖作而曰鄭生不去吾道東乎文華國如此山二師詩巻後題二師吾鄉佳士也求諸冠巾而不得乃扵呉越山水間見之筆下時有食肉風味使二師不脱冠巾汗漫江海日挾毛錐子自食且傷屯悼屈之不暇安得有此清鍊耶洪崖先生圖謂洪崖是耶三十年却走人間世寕有是耶謂洪崖非耶漢宮唐殿行其庭者誰耶或是或否或見或不見乃所以為洪崖也戲書竹蕙圖竹有君子之節蕙有士大夫之氣抑丈夫也君子人與三十八代天師廣微真人小像賛天人之師留侯之孫實惟先封其慶有源乃進上公錫賚東還呉山莅止玉佩珊珊公顔怡止公心夷止永懐天寵不驚以喜維教之門維道之宅式曕清風光我林壑西湖逰約結方外友同作勝逰真箇中人允為好事况千里相逢誠非草草百年一息去者滔滔登山臨水或嘯或歌抱琴與書徐行徐坐人耳人耳時哉時哉竹林之勝不數牙籌蘭亭之集肯同金谷江上清風山間明月不亦説乎不亦樂乎水中鹽味色裏膠青必有以也必有與也善畫者圖形其有賦詩者隨意不拘題方白雲山蔬譜粱肉之味不逹扵山林蔬蕨之甘不登扵朝市地勢則然也然粱肉厚味固有以螫其子孫而蔬蕨清風千載有餘甘彼夷齊者獨何人也耶因書以還白雲方巨濟入山蔬譜云陪杜南谷踏雪上白石洞天賦反招仙辭青山兮如龕白石兮如篸誰陟之兮有佩珊珊曰惟計大夫之登乘兮有籌此探太極翁之上謁兮有丹此函方一䇿而成伯兮履六甲而叩巫咸九還之在鼎兮玉女浴而丁公熸去之二千年兮葛藟覃覃有真人兮目眈眈乘飇車兮罷朝參鞭鸞鳯兮行江南斵雲儋兮裁雲縑研元始兮跡盤古箋谷神兮説青驂嗟哉世之人方累丸兮胡為乎不惴惴而沾沾履固不可以察察而汶汶兮言固不可以炎炎而詹詹顧何樂乎凌溝澗而渾渾兮蘄自墮扵天鉗歸來歸來誠不可以久沐兮胡不汲汲河漢而凌雲嵐嗟哉爾山之人兮吾不汝乎云嫌夀岩人莫不欲久其所愛亦莫不欲尊其所知惟知與愛者之心亦惟其善之歸而已王氏為善且三十年與之交者知其真受其施者愛之厚徳慕生扵感激譽道起扵衷私宜切切然欲其久存扵世而傑出扵時也遂以夀岩易其名使慕善者稱焉賦偈如左福地福地七十二在天地四方惟功成行滿者居之此神仙者流之説也然而由人境求福地雖知者有不知語福地在人境雖愚者有不信固非囿扵形者之蔽乎夫人以至善之身履至實之地行義侔神明語嘿叶金石休休其祥熈熈其和諸福之物與日俱來而不出庭户之間欝然洞府之䆳名山大川日在人境中矣錢唐王氏某心有善根沃以素積視時廢舉每得贏扵汎舟之役補陀老人實示之夢利往利來垂三十年扵是所履益堅所持益厚而所施日益廣矣餐和蹈淳動與吉㑹足無愆步心有寥天蓬萊方丈云乎哉方外之士咸以福地譽之必有得其用心云題葉天師奉化鎮海圖余居奉化始從父老聞其事既而與修縣志及錄遺其事今觀此圖若信有其事者天地間山川流峙其性也性也其道也一易其性則非道矣宜乎葉君之為神也題吾子行瘞猫文後子愛猫如愛人性馴善捕有人理也故封有丘凡有書象有肖匪溺斯礉乎狗馬亡辭帷盖至矣松鄉集巻七
