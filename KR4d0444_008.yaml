body:
  text: 松鄉集卷八元任士林撰題大滌洞天世路迥欲絶仙風杳若遺山餘秦漢迹石有晉唐詩日月樓臺曉雲煙草木姿藏書更何地白首付幽期耐交吟魚逰北海潮木偃南山坳剖木木有漆煮魚魚有膠二物幸相遇締固不可搖如何同心人不耐白首交冬日澀霧行冬曦玄春散臘樹江郊卧嵗年風雨犯百慮出門山斑斑下有鳥雙翥山深鳥翼寒啅啅啄中步訪牟大卿自開黃葉徑城郭有山林老失相如璧貧嗟靖節琴青天庭樹在白髮鏡塵深欲叩黃唐事寥寥千載心寄陳宣慰帖客從崑崙來遺我一寸膠投之東海中濁浪生青濤世人飲涇水淪浹如寸醪醉久與俱化復惡醒者勞客笑豫亦休涇水方滔滔鄞女墓一卷書存禍未央湖西人老淚浪浪東風不與埋黃壤孔雀屏深坐蔡郎書族祖拓齋先生白頭吟卷後少陵三賦明光宮清吟往往嗟不逢退之文章起八代獨與東野相追從詩人肝脾有清氣語默正與時交通我翁聲名四十載回首清廟埋黃鍾懸將萬斛扛鼎力波瀾卷入呻吟中酒酣阮籍巳類達瓶空靖節秖言窮顧無一語道興仆自與大雅同汙隆諸孫習氣掃未盡日有元白來郵筒更從帳下給驛卒一杯俯仰天夢夢顧道士松巖圖貞姿自孤特况乃生巖扃巖扃抱石乳貞姿懷茯苓所以松間人獨誦黃庭經青雲傲白石野潤含青冥便欲托巾履何用腰紅鞓屏居壯志輪囷強未銷屏居萬事飽塵勞貧知渭竹真堪傳老恨江梅不入騷山谷樵歌間日月江湖漁計足風濤妻孥燈後應相笑頭上如今有二毛題外弟唐楠扇南北阮郎俱白髮東西施子共春風人生得意何所羡博後神叢亦漫同海扇海中有甲物如扇文如瓦屋三月三日潮盡乃出漢宮佳人班媫妤香雲一篋秋風初網蟲蒼蒼恩自淺猶抱明月為夷居至今生怕秋風面三月三日才一見對人搖動不如烹肯入五雲清暑殿荒村布荒村一機布辛苦朝至夕置之綺羅旁不入金粟尺持歸語村婦投梭面不懌機手那可換明年漚麻白次韻吾子行新年有道貧方樂無營坐亦深新詩知病後老鬢覺年侵信有乾坤力時勞江海心文園亦消渴渾愧白頭吟已分身將隱還驚老易過時來慰岑寂相與惜蹉跎白髮短猶櫛青銅暗欲磨人生有如此我醉子當歌雪後春風起天空江水來新年渾作客多病孰憐才有道身先老無人首屢回承禎須不爽聞已掃丹臺公子舞歌明河在天不可舠我欲汲之成酒醪維北有斗不可量我欲挹之為酒觴人生豪誕有如此况有開筵栁公子公子平生白苧袍酒酣起舞天為髙大鵬長風九萬里老鮫鱗甲秋江水坐中忽唱河西曲琵琶聲髙裂寒玉態濃海樹出鷓鴣意足霜枝下鸜鵒為君一洗兒女目衆賔自愛白宰酒情歡不用夫起夀長空更唤明月來人影檀欒風滿袖鳯求凰鳯將將求其凰凰既遂辭母旁逐凰孔良不與母同翔鳯心長海樹涼用子行韻簡周景逺應奉供奉平生酒中郎絶代書自便青瑣直未放碧山居輩行人誰在行藏意自如絲綸須世掌曽識典墳初投容齋徐大使湖山出清夜靜攝萬井喧誰持白月行鬼物肝膽寒徘徊弄明光孤照欲墮軒不眠坐成曉海濶蜃氣昏幽蘭濯天秀玉立寄巖壑生同野草青老壓俗眼白豈無桃李榮東風亦輕薄作書戒荃蓀深根付開落送許君實同知之任鄉邦因簡于有卿知州一出已十載江流只目前家鄉荒政日客路獨醒年南郡碑錢逺東山屐蘚圓歸心隨使鷁漠漠海雲邊道訪子昻舟出苕溪吾道何迂濶舟行亦滯留客心當震澤詩卷出湖州風急初歸鴈沙暝欲下鷗誰歌招隱曲白首若為酬謝廣微真人假以自然處士之號處士猶處子聲光畏人聞正如豹隱霧又似虬蟠雲乾坤照孤耿草樹含幽薰虛名儻可乞何以娛斯文客逰華亭訪衛山齋東浙青山少西湖白髮新漸多江海伴更卜水雲鄰楊栁初籠雨蒹葭欲剩春不愁成汗漫天地有間身老鋏無魚久孤亭有鶴來聲名為客纍懷抱向人開白雪仍巴曲黃金自隗臺一年春又半搔首鴈空回劉將軍射虎行半濕新蹄山徑曉於莵夜渡海中島百夫鼓譟屋瓦震將軍彎弓白日皎地形平露草不長狂嘯無風威欲倒玄翎一中洞心胸坐據木牀脫鬚爪胃中白骨誰家魂紅肉已供人醉飽人生意氣不下堂車鐸當當馮婦老曉發衡山訪子昂學士山林真學士天地一詩翁乘興不可返孤舟雪後風浩蕩襟期别艱難道術窮何當真卜宅共老水精宮送鄧善之修撰王眉叟孫初心二提點同入京師客上幽并道人瞻李郭舟天清北斗近水白御河流卿月殊庭表文星禁掖秋相看多道氣同是泛瀛洲留别沈介石尊師我本逰山來竟坐三日雨洞深石頭滑對面成幽阻平生韓退之衡雲故吞吐復恐北山移林慚掩虛户人間出處士造物正未許下山見塵霧回首天一柱夀杜南谷席上得寒字洞府人間見春風花底看新宮銘有草白石篆猶丹道在人知往門深客遂歡會開唐貞觀莫惜海漚寒送吳飬浩編修入院制作方期子編摩正得人重金須陛對良玉已庭陳逸氣開塵闊清風起古淳騎驢當盛日猶見玉堂春屢訪開元陳髙士不值我亦乾坤一腐儒杖藜時訪白雲居故人不入江海夢道士恐驚世俗書蕭史鳯歸雲縹眇劉郎桃在雨扶疏當年親見東風事楊栁絲絲二月餘李唐春牧圖春氣熏人未耕作江草青青牛齒白牛飢草細隨意嚼老翁曲膝睡亦著蓬頭不記笠拋却午樹當風夢搖落夢裏牛繩猶在握昨夜囤頭牛食薄明皇貴妃並馬圖宮坐巳無袁盎却輦車不見媫妤辭夢回南內凄涼夜幾度東風並馬馳山平水逺圖三峽波濤揭暮天九疑草樹泣晴煙人生住此空髙險幾夜秋風得穩眠用韻酬陳渭叟林伯清我本厭塵市志在棲幽清還聽客城雨深夜愁寒更山中兩道士孤鐺煮雷鳴潄沐得清謡久却世上名何用王子喬相從學長生題赤松圖安期一局石上碁臧穀兩兒松下石山中人在蓬萊宮夜半飛丹九天赤山人曉攜白雲出袖中却帶金華還朝廷有道海藥至金馬門外無青山松鄉集卷八
