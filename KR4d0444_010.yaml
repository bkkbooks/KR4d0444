body:
  text: 松鄉集巻十元任士林撰石刻天台瀑布寺謝表雲漢用章來九天之丹詔林泉改色開一道之銀河萍水交歡雨花散瑞中謝兹盖欽遇皇帝陛下心行四海徳㑹一元風雨霜露無非至仁妙化機扵不息山川鬼神各有寕宇肆佛教之重興大轉法輪載𢎞講席臣僧敢不廣延釋子仰報聖恩衍智者天台之宗式克用勸賦興公瀑布之句永矢弗諼庸妙談扵九旬仰祈年扵萬億臣僧無任省府祈晴意旨日者衆陽之宗照臨在下民為有國之本種藝維時俯瀝輿情仰祈大造伏念某等誤膺朝命濫倚省垣國賦有程豈徴催之能免官刑惟恤或詳讞之未精不稼不穯而胡取禾其身其家而不知本遂成積累乃遘灾屯顧惟江浙之間田最卑而水易溢迺當夏暑之日雨不止而民重咨麥已熟而不收秧既老而莫種失此及時之役曷為卒嵗之供心則凛然民之瘼矣敬闡祈禳之典以求開霽之恩伏願雲漢昭回乾坤清穆寅賔寅餞御無曠扵羲和自明自威治聿歌扵堯舜省府祈晴青詞大明生扵東惟無私照百榖麗乎土乃亦有秋俯瀝輿情仰祈穹聴伏念某等誤膺朝命濫倚省垣治民事神之間能無所愧修身齊家之道罔底于行適當夏暑之時未遂田功之本弗種胡獲有欲必從敬求開霽之恩以請生靈之命伏願乾坤清穆雲漢昭回昊天曰明宜舒長扵化日烝民乃粒式歌詠扵豐年呂道錄保安醮䟽意皇穹降監嘗控忱辭萬里還家庸陳諾責叨榮巳愧昭謝惟恭伏念臣幸囿儒風竊窺𤣥學粤自先師之入覲獲侍後塵乃䝉教主之見知俾陪清列近由北上迄乃東還念山川道路之阻修何恃而往矧寒暑隂陽之變化惟疾之憂壹是控祈兩全出處敬潔精純之薦仰酬覆載之恩伏願上帝垂仁髙真錫祉儻身㳺鄉部粗安清净之規則目睇𤣥門少遂繼承之托謝恩醮疏意𤣥穹監在恭被璽書妙有庭深叨塵鄉部拊躬知懼稽首加慚伏念臣少渉世機幸依道域委心冲寂豈曰淵宗遇事迂疎未聞𤣥奥尚念先師之際㑹僅拜寵光敢圖教主之矜存俾循往武惟教事有鄉鄰之舊而教門煩規度之餘何以仰承未知淑後敬潔精純之薦用伸昭謝之私伏願上帝垂慈衆真錫察常清常净共瞻官府之更新是繼是承式衍家山之甲乙宗陽宮三清殿上梁文玉京三境之居威顔如在天子萬年之夀景福有祈睠惟宗陽之宮翼近省垣之地山川交慶棟宇一新載惟杭州路道錄住持提㸃南谷真人生遇聖朝恩承先帝理身如理物日深抱一之功事君如事天時謹祝釐之奉越自鋒車之聘召薦被璽書之䕶持𤣥都之樹森入垣墉滄海之波輦為基築扵是輪奐極東南之美經營來山嶽之竒畫棟朝飛開金闕寥陽之殿黍珠晝見儼瓊林羽盖之尊増八荒夀域之基侈四海太平之觀以朝以夕以禱以祈自我聰自我明擬形容是之謂象在其右在其左非壯麗無以重威爰舉修梁載陳善頌抛梁東海月團團上碧空若木風清黄道直太平風物萬方中抛梁西瑶臺新月碧雲低閭闔春深王母宴九重孝友夀天齊抛梁南殿閣薫風入陛簾星極老人㳺象闕遥呼萬夀華封三抛梁北斗極天髙星歴歴五雲深處紫微明炳炳前星垂正色抛梁上萬國熈熈瞻治象風時雨若太階平鑿井耕田人擊壌抛梁下百榖芃芃秋滿野人人鼔腹慶豐年草笠黄衣通八蜡伏願上梁之後𤣥風昭布道化流行皇矣上帝監觀四方衍天下歸仁之治錫厥庶民斂時五福致臣子報上之情四聖延祥觀上梁文乾坤拱北極之居威行四衛棟宇開天宗之勝福鎮一方海岳騰歡神人交賛恭惟𤣥教大宗師上卿真人身為教父道際聖朝入承清問出侍属車簡在九重之寵下詣重𤣥下探無始妙凝三極之光儼然上界官府之尊賁爾東壁圖書之序築宮廬而留侍錫崇真萬夀之嘉名對湖山而坐馳領延祥四聖之珍宅自夜半有力負山而走至堂上一言侵疆以歸千載之規其道復昌十年之間何事不立今則紫垣突兀畫棟遄飛瞻天象虚危之垣噦噦其㝠噲噲其正當揚州牛斗之野赫赫厥聲濯濯厥靈爰舉修梁載陳善頌抛梁東一水天門映日紅祥風逺起蒼龍角草木葱蘢萬墅中抛梁西天目山髙碧漢齊畎畝秋風成萬寳玉於菟外下苕溪抛梁南一塔河西九曲參薫風朱鳥神霄止聲教煌煌自朔覃抛梁北一天星拱開璇極朔風髙駕𤣥武尊萬里承恩車軌直抛梁上雲漢昭回著天象帥垣四列紫微髙威徳堂堂民北嚮抛梁下山嶽真形鎮民杜時暘雨若地力饒治世歡聲散田野伏願上梁之後𤣥教靈長明威昭布逺揚聖化山川鬼神亦莫不寕衍作太平東西南北無思不服宗陽宮講堂上梁文青牛車之立教以道授以言傳玉麈尾之談𤣥其人存其政舉睠宗陽之主宰實教門之棟梁昔畫宫于堵垂三十年今自堂徂基為第一義恭惟南谷真人言為世則心與天通八彩重瞳接清光于堯舜兩儀四象探𤣥旨于羲文發老子五千言為有用之書去堯夫二百載得不傳之學無為之為盖自有道可久則久夫亦何心丘壑胸中三年種竹十年種木笑談物外左手為矩右手為規于是植幢盖于瓦礫之場使城郭有山林之趣鼔于宮聲于外來霞履于四方跂斯翼翬斯飛振宗風于千古載陳善頌爰舉修梁抛梁東呉越平分一水通曉日髙懸黄道直蓬萊一葦起天風抛梁西空翠濛濛水一堤鐘梵聲中祠太乙星階月地碧雲齊抛梁南碧漢河西塔影參坐鎮飛濤跨胥種箭痕吹影老虬髯抛梁北北闕巍巍開斗極虚危垣下繞龜蛇仙佩珊珊飛白石抛梁上萬嵗千秋開治象祥風甘雨報豐年四海熈熈民擊壌抛梁下薊雨燕雲擁宗社一堂穆穆衆賢和藪鳯郊龍無遯野伏願上梁之後道鈞布物講舌懸河垂黍珠于九天逺者來近者悦湧玉局于大地統有宗㑹有元用開後覺之天欽祝聖人之夀醫士求財施藥䟽扁鵲之門不拒病夫盖欲救已然而防未然狄公之籠宜多藥物奈何得有限而求無限况俱收並用得宰相之方而羡補不足乃仁人之事用于逹者助我初心將求施諸已而及之人母曰乞諸鄰而謂之直儻參苓為君子甘草為國老並蓄良材則邯郸為婦人咸陽為小兒大施敏手吾子行夢蝶壇䟽誦五千言嘗究猶龍之旨以六月息載開夢蝶之壇善戲謔兮志恠者也載惟真白方丈布衣道士存方寸地卧百尺樓有淳于髠之滑稽有東方朔之博物賈誼升堂相如入室惜不用賦于夫子之門李邕識靣王翰卜鄰肯嘆誤身于丈人之聴于是心超蟬蜕之境神㳺鳥跡之初蘧蘧然栩栩然何必扶遥三千里九萬里誾誾也侃侃也不妨詠歸五六人六七人莫笑邊孝先請問南華子朱伊叟注刋詩板䟽古者有采詩之官雖諷詠而必錄人生為垂逺之計豈言語之可無有如伊叟之賢是亦浙東之秀五十年客食巳愧白頭數百篇詩章豈無青眼况家秘書為之序引戴翰林重以品題有不逃藻鑑之公大抵出性情之正笑推敲之未定幾度月明恐傳冩之或多一朝紙貴乃謀鋟梓誰與揮金或憐心力之窮少賜騷場之賞名字之立幸不幸敢曰詅癡江海之逢知不知共期愛助買屋䟽擇逰斯擇居每羡江湖之樂問館必問舍豈無交友之情相與謀一枝之安或者謂諸公之責况錢塘亦士大夫之冀北公安歸乎而西湖豈㨗徑者之終南吾無隠爾不用旋栽楊桞何妨髙詠梅花須知束書有屋廬便可借車載家具王翰卜鄰李邕識面尚尋杜曲清風司馬買宅鄭公置園猶是伊川盛事允為佳話各載芳題代曹彦祥䟽有客清亷以自髙當全其節使人阨窮而不憫夫豈其情有如彦祥之賢實為曹氏之秀夫人自一介而上皆足以供妻子之歡而公則二年以來惟恪守軍旅之事其貧如此其守可知不改其樂不堪其憂亦今所少相煦以濕相濡以沬毋渝爾音四聖延祥觀塑三清聖像請䟽太極渾淪擬形容之是謂象威顔咫尺而神明之存乎人儼如對于髙居信須逢于妙手載惟某人山川秀禀造化功侔是以似之肖貌天地之性進于技矣逰神元始之前適從龍漢年中曽入黍珠㑹上遂令制作超入空𤣥自我聰自我明有相之道在其左在其右毋貳爾心幻成三境之尊欽祝一人之夀代道録司賀天師夀兹審瑞應赤松祥開仙李接龍漢年中之統作天之師開瑶池宴上之春曰仁者夀歡傳洞府喜溢江山况九重頒正印之初正羣仙銘新宫之日某濫焉司録信甚歡情二十四巖清垣之尊誕揚宗教三十萬里弱水之隔遥徹頌聲代四聖觀賀宗師夀赤松瑞應紫氣春浮秩進公卿據東壁圖書之勝教行海岳儼上界官府之尊光近天顔歡傳人世仰惟某官性涵太素徳合自然為大宗師黙賛無為之化𢎞太上教恭延有道之長遡象麓之仙源開燕雲之華宴某等身依芘厦情切瓣香夀道徳五千言遥致松椿之祝望蓬萊三萬里永依桃李之春賀呉閑閑都提㸃道際九重提宗門之正印身為衆父得𤣥教之单傳賀溢冠裳歡傳海嶽仰惟某官𤣥冲而清浄沉潜而髙明大知閑閑窮理盡性以至于命至人黙黙和光同塵而淵乎宗鼔大道槖籥之春新上界官府之聴有三寳有三樂顧舉世之所希無二道無二心合衆妙而為一遂令末學屹有旨歸某等踴躍瓣香周旋芘厦大宗師之𤣥奥徳愈盛名愈彰聖天子之簡知祖拜前孫拜後敷陳言淺欣忭情深開元宮鐘銘鼓風霆爐造化范鴻音時旦夜大道鳴皇風駕祝聖人夀天下佑聖觀牛鼎銘道士呉存真募呉徳潤金鑄牛鼎銘曰牛斯負鼎斯薫祝𤣥武祝聖人肅堂銘為昌國李侯作昌國在絶島中波濤之間鬼神出沒魚鹽舟楫之民正未易治也河間李侯某為刺史三年人愛其樹余不及識侯州文學嚴心傳來為余言侯仁人也構其居以肅堂自號子第銘之余聞行宇宙間者惟風為最神風者造物之槖籥也于春為至仁于秋為至肅今夫春嘘枮吹生風之仁也然蘭茞叢生于蕭艾之中蘿蔓生長于株林之上仁且有過乎然因材而篤之道則未嘗不整仁非肅之造乎逮夫金風一行萬物以成妄者彫落真者揫斂肅豈無功于物乎然伐後之肄食餘之果生意抽伏正毣毣然肅非仁之濟乎乃為之銘曰天地之間和氣生物以肅行秋真存妄滅曰仁非肅中有品節曰肅非仁生意勃勃是曰兼濟柔克剛克于以觀風君子之徳代賀天師生日呈子兹審赤松瑞應紫氣春浮作天人之師肇千二百年之道如山阜之夀開二十四岩之祥垂奕葉之光華埴𤣥門于永久某身逰琳宇心遡清垣九拜惟恭一誠匪簡擗麟脯以行酒莫陪上界之羣仙問龍漢以紀年益衍後天之遐筭下情無任震越祝頌之至趙䝉齋入道䟽三教並立天地間惟士之末流漫無所向萬事不如雲水樂而身之將隠何必求文况于今為庶以來亦嘗得其門而入儻腰纒十萬貫相與成騎鶴之逰則口誦五千言便可究猶龍之旨小子有造諸公慨然定光寺立經藏吉語大雄氏以言垂世寳藏興焉公輸子以巧服人金輪逺矣自白馬寺流傳寖廣而大牛車委載𢎞多如日之布如漢之垂不離文字如天之旋如地之運立透機關手好手中大作莊嚴人非人等皆生歡喜某幸操末技來佐勝因八萬四千母陀羅尼開無盡藏五千四百巻聖諦義轉不退輪永鎮定光之伽藍仰祝無疆之聖夀松鄉集巻十
