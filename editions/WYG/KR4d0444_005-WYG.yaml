body:
  text: 松鄉集巻五元任士林撰閑閑説吕道士自陽明洞天北還京國里人任士林遇于錢唐之開元因道其友吴君閑閑之賢而問其説洞天下之物理者形色不能移究天下之事情者耳目不能役是以無營無求嗜欲净也不將不迎天宇寜也夫天以貧富貴賤毁譽飢渴寒暑命于人而人之生日侈且無孳孳之事者其志貎屈室無擾擾之入者其妻子怠故酬酢日工馳逐日勸吁亦勞矣然而聲利之府而有尸居之安車馬之塲而有踵息之樂其故何也盖萬物以黙黙中人識其機之來者不危萬境以察察移志審其處之安者常吉是故充吾知之所至以應夫事之方來如止水之過跰􅓷鏡䑓之坐蓬垢舉不足以凂我豈不綽綽然有餘裕哉則坐忘之齋天㳺之室日在人境中矣莊子曰大知閑閑此之謂也雖然吳君老子徒也灑然熊豹之姿充充然日與猿鶴相俛仰方將枕藉白雪吞吐元氣則其清淨空寂之學顧何徃而非閑閑之境乎然鍊形氣者勞其神歌洞章者詘其息鞭鸞笞鳳之御逺上界官府之事具雖謂不閑可也非神交莊周之論於千載之上者其孰能與於此作閑閑説阮氏二子字説圭璋璧琮所以備頫聘之物也與事人之有尊卑衷之旗也故有備物必有備用有備用必有備質有備質必有備工工質之不備而能成物以致用未見其可也易水阮氏子伯曰圭仲曰璧從余㳺羣居之友思易其名故字圭曰友璋字璧曰友琮固將以備物而成用也然貴爾質使不疵庀爾工使不劌卑以進之而尊受之禮以成之而信徴之則人莫不嘉其有比徳之行也雖然圭璋示有奉而全歸之所以成禮也璧琮示有加而重入之所以成材也成禮成財人道之大者也出處進退宜有所擇矣可不謹哉趙常父字説三山趙君與權字常父江海士也與余善既而為吾州學官正部使者髙公行郡常父偕余謁郊外既至州長貳屏若拜庭之為獨常父命坐明日詣學宫常父語益親出題命試士與進退凢學之事唯常父是聽又明日瀹茶論政視墨汁三升在案上因請作常父二大字公執筆未下而問其義於余余起而對曰萬事之理莫一乎常萬事之適莫通乎權可乎可不可乎不可者常也可乎不可不可乎可者權也今夫天斯覆地斯載日月斯明而雷風山澤之妙雖權亦常也今夫衡低昂輕重唯物來是應而銖兩之昭昭一定為不可易是故察權於常如斗之杓火之燧察常於權如色中之膠青水中之鹽味也歟聖人以精一執中示後世故夫子鑿鑒然揭中庸之徳而適道與權之論不廢子思作為中庸一書而時中之義特明逮執中執一之論出天下始日趨於權矣故流而為術為竒而不常之羞不察也常父以常用權以權守常名之稱也公曰善遂漬墨作字俾書其説河間牛仁名説河間牛理以醫道㳺公卿間余識之於栁使君之門嗣是欵我書樓之上日再至遂及盡叩其及人之效業亦工矣一日斂襟問余更其名余名之曰仁昔者司馬牛問仁於夫子告之曰為之難言之得無訒乎夫醫之業有為仁之方黄帝所以設為八十一問答竟陳為醫之難是豈或異於夫子言仁之難乎牛君知不易於為仁必不易於為醫矣牛君曰甚善名我而併以問字復字之曰仲濟云戴易初説人生天地萬物備日與造物者磅礴乎無垠非一部全易乎窮變通乆之機追感攻推之妙是不可不謹其初也初乎易乎百骸九竅其迭為君臣乎何有乎圖書易乎初乎日用飲食皆羲文周孔之妙而連山歸藏周易作矣我醉欲眠先生就舍胡季常雲寄説雲山澤之所蒸也然則山澤雲之宅歟其所以浮㳺巻舒於太空者非寄乎雲非日月星辰比也日月星辰固根於天者歟日月星辰非天之贅乎去日月星辰而為天蒼蒼者其旦夜於人乎雲芒芒然終日行山澤間人不仰其潤膚寸一族草木委心而待滋異哉其所浮㳺巻舒固屯需之庭乎其寄乎作雲寄説高氏族譜引髙氏族譜居有莘曰昪子明作也自唐太傅文獻公至先人父若於世中則魏州别駕府君為有莘别子之祖繼别者若干世繼禰者若干世宗合族屬具載逹而仕則曰諱某他遂名之髙祖曰諱某祖之也大父曰諱某逮事之也娶某氏皆不書不以名治際㑹間天叙也生某嵗卒某嵗不書主在室也自别駕𦵏有莘八世異兆相望昭穆之有序位樹壤之有豐殺不書墓有表也别駕而上葬不知域因不書也觀是譜者尊祖敬宗収族之道盡矣夫阼階以婦降則著代之年也代日逺則恩日踈恩日踈則情日衰矣故六世以外姓别於上戚單於下然等而上之由庶姓達於正姓繫而弗别者親之也人道之紀也順而下之由正姓達於庶姓綴而特殊者疎之也先王之制也明先王之制繫人道之紀此譜之所由作也嗟夫夫人父生之而别禰之繼殊母育之而羣從之叙出婦妃之而世祚之端造處人道之大可不自慎乎唯抗志節則可以闡宗姓存孝悌則可以保族屬知人事之本可不自強乎子明好古汲深與予㳺最宻譜之成也俾書其端不得辭王一初説大哉一乎天地萬物之初乎故有一而未形則其初著焉有一而已形則其初冺焉然一而二二而三三而百千萬億則百千萬億其各有初乎由百千萬億之初而求夫二而三之道且不可知况一其一乎一其一則二矣而其初已不可求矣惟夫要終而返極合散而求全則一者常在初者常存孰得而二之乎是故求之吾身以父母未生為初而繼善成性兆於二五之凝求之吾心以情欲未動為初而生静感動起於七者之發一何從求乎初何從朕乎然而無極在吾前混沌在吾後一者常湛然初者常不露以之日接以之天融雖百千萬億之殊吾知其一而巳百千萬億之窮吾知其初而已何有乎未形何有乎已形者乎雲間王一初字一初號一初問其義於余作一初説松鄉集巻五
