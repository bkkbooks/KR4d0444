body:
  text: 松鄉集巻六元任士林撰復志賦哉黄靈之叔𦙍兮旗所履而為姓越奚仲之有國兮誕繩繩於車正逮長滕於宗周兮歴萬祀其猶競座以言而發身兮鄙以力而稱聖紛支屬於五方兮既班班乎家乘亶㑹稽之句章兮聿御史而有聞迭世祚其顯昧兮覃斗海之有孫𦕈隑州之一曲兮羌幽樂於白雲抱曷鼻之倥偬兮戴圩頂之髼髶辟長風於萬里兮信散木之擁腫窮恫鄉之臠巻兮矐余目於蹇淺招庚癸於首山兮想飢渴之不免孰知夫倡麴窮之大呼兮勤茅絰於叔展雨絶灑於碧虚兮空囘戀於有渰木掩靚於春陽兮佩秋風之未慘忻吾車之未駕兮謝直矢之多岐抱素絲之不染兮紛黒白其何為軻耆丹之竒餌兮不如魯勾踐之良規大良造之適鞅兮不如退受妄人之罵辭秦悁悁乎嫂妹之訽忍兮痛修辭於殉市之尸非湣湣乎子瑕之愛憎兮迺懼夫姚賈與李斯惴僨軍之株坐兮悟不死厠中之更溺㦧女子之見賣兮悔不忍胯下之年少讓不思國士之揃拂兮又何致必斬趙衣而讐報亥不激屠門之骩曲兮又何致必椎晉鄙而危蹈心固不可溺於所渉兮智固不可售於所市身固不可試於綢繆與睚眦兮足固不可失於流行與坎止感耦耕之招擕兮何滔滔而不萉守孔約而罔貳兮憚巽羽之人犧不察察於薇粟之重輕兮亮溝壑之有命不悶悶於蕭艾之糾結兮付江漬之行詠信皎皎其何之兮聊黙黙以隠情卒餘懐之嶪兀兮庶察者之見徴道悠長而日邁兮罔思謝之足懲尚夀考之𦙍彭兮安知來哲之無情遊越天門賦柔兆之春二月既望任子與客泛舟逰於天門之表于時颶母停飈慎郎捲霽飛澇不興湠漫無際始則拖長綃偃帨腹徘徊蚌蛤之洲睥睨黿鼉之國少則掣掣洩洩汎汎悠悠飄如雲逝蕩若漚浮浩不知蓬萊弱水之在眸也浮余觀於漢裔𣺌一世之䖃苴有石塘萬里鱗鱗然隠波濤之下此殆祖龍氏之所鞭乎何其神也靈洲瞥來絶島遥没隆隆隠隠過大業天子之祠焉見其君臣黼冕將帥鼓旗儼然牙檣錦䌫銜尾而維也又何其竒也昉二帝之所䂓悼生民之不幸身未死而變隨顧英雄其何徃於是停橈而思思窮而愁作噫嘻悲夫客亦知夫天地之數廢興無常而孰知其綱蠻不必擅觸之強荆不必暢凢之亡江上之寂寂又安知非人世之揚揚客遂鼓枻而歌歌曰擊蘭漿兮扣桂舷訪田氏兮弔仲連數術不可乆御兮鷙力不可謂賢然乎然哉吾烏計吾身之乆邅余迺敲脚唱小海以和之客復擊節順流而歸不知舟中之有明月也閔已賦并序正月八日獨坐雷公山中天寒風𦂳抱書自憐漸老醜之逼人慨盛時之不再匪私騂角恐墜肩墻作閔已賦庶㡬成此志耳其詞曰肆后皇之嘉貺具藐然之一身戴𤣥髪於芳鬢含纎齒於龎唇匪肖貎之我私獨降質之爾淳有賦予之重責尚墜緒之大振張余挾於㓜眇自青襦而裹巾亦淳濯於羣汚窺末光於徳隣孔孟吾之師不可以復夢兮為誰門之人顔賜吾之友不可以遽作焉為誰居之羣倚泰山而長嘯俯黄河而孤嘶瞻飛雲於月下訪流水於囘堤謂雲行而月䟦兮亦升東而沉西謂水逝而堤在兮忽髙岸之為谿理不可以逆曉事不可以深稽去者非人之所推陷者非人之所擠來者不可以徑遏降者不可以驟躋𦕈余思之茫茫隠余神之凄凄匪飢寒之足慮匪患難之足疑恫大志之未立矧絶學之無依人不能憂余之憂兮余亦不能悲人之悲聊䑛筆以自係走四方而陳辭庶聖道之未沫將援余之孤危感雉鳴賦余歸山之明日甲子日斜有鳥有鳥鳴于竹西赬撾綺翼紺趾雕題余睨而視之曰此殆丹鳳之儔耶嗟乎山梁之雉也亦何為爾栖栖者歟鳴聲益和如語以臆曰承后皇之嘉惠肧太和於卵翼攬草木之清麗濯雲烟之絢碧被文繡於外體抽肺肝之五色將自㧞於羣飛羌好修而強飾吁嗟乎余身之章兮又安知非余身之賊祝網宻而羣空虞機張而羽積林無全鷇野絶胎息觸罥罣之紛然聊擇音於彼木濯余羽兮清泉充余枵兮楝實固將坐錦衣於泥塗破黼藻於荆棘者歟悲夫太上貴質其次有文文而好自用斯為下矣猩血染而膋泣象齒㡬而身靡鷹能搏而困軒楹馬能馳而厄鞭箠龜以筴焦翡以毛死是故君子不失足於人而黄中通理也弔正平之鸚鵡悼賈傅之飛鵩訪稽氏之昂鶴睇楊家之䑛犢拜自獻者何心秪腥臊乎偃肉已矣乎春山空兮春木頎春雨零兮春草肥天地為樊兮日月為鞿優哉㳺哉兮飲渴食飢叩鐘鼓於魯饗謝簫韶於舜儀彼霧中之𤣥隠固將有感於陶妃翰音賦若知雞乎錦衣繡翼孤咮峩冠被鳳之彩挿鶴之翰音聲俊美容止輕鮮溯羽族之稠濁諒五徳之獨全然而沐浴泥沙歩啄蟲豸曉樹棲卑晩栅藏矮朱朱喌喌進退失解夫豈慕鳳凰之戀匹仰鷹鸇而䕶雛不借力於九萬遂扶揺之所圖鶯鳩搶榆烏鵲遶月觜啄非雄羽毛未刷猶决起而驚飛吾何獨守此桀也爾則明河在天曙色上户一振聲於兩翮若怒飛而逺翥勢甚超凌力則困阻氣亦飄揚身不能舉如長沙之誼蠶室之遷過永之栁謫潮之韓匪志氣之不厲獨墜影於孤鶱既漆我羽又磓我距謝雲霄之羽儀抱村落之風雨恫升躓之有命匪軒沉之在人聞爰居之蹭蹬亦避風乎魯門蟠松賦𣺌堪輿之神氣孕東海之平巒紛百昌之甲宅儼孤松之結蟠根半蝕以秀出枝萬折而囘環允神物之附靈時矯首而盤桓瞰然鱗甲之四縱傑出頭角而㠝岏霧市暝合雲衣晝飛非鞭霆而欲駕則既雨而初歸爾則童豎俛仰恍然劉累之馴擾風雨吟哦又似夫葉公解衣盤礴雷電至而飇馳也噫嘻龍為物靈不離鱗甲蕩日月撼山淵不崇朝而雨六合何其神也桎梏禹宫之梁斵削雷澤之梭延平之劍津吏夜驚長房之竹騰波自駕象㒺求而不得雲霧集而時化又何其幻也而况乎青髪君之盤蹝秦大夫之舂容妙蜿蜒於氣母抱不化之神蹤龍不知其為松松不知其為龍人不承澤螻蟻為宫龍乎松乎出冡間之雷車走隴上之雨工松乎龍乎撫亭曲以一嘯山四立而長風鳳花賦若知鶴林之神乎霜月如銀西風砭人丹艶自春何以羽翼賁此坡壠爛然九苞蹲為孤鳳百鳥無聲精采欲動吾聞蜀山之魄下故墀而啼寃灑丹血以成葩幻七七之妖仙迓羽族之初服宛來儀之蹁躚出不化之神為帝為䳌為花為人而復幻丹穴之形有不可致詰於洪鈞雞憚犧而斷尾鶴有雛而㧞羽機心洞人網目如雨將色舉於朝陽甘草木以同腐者乎噫嘻艮嶽之植政和之綱輦而致之汴水湯湯一蘤不發摧折無光天子曰吁謫歸故鄉抱刖而旋東風重芳蓋天津之聲舌既饒矣使一見賞幸則華林之觀銅雀之二喬矣其不為強項供奉之所笑者㡬希安在徳輝而下之立翠㣲之曉月伴楝樹之後風萬卉欲寂空山自紅太牢鐘鼔而不恧紅裙檀板而不驚蒼梧楚楚翠竹亭亭清風徐來求凰欲鳴𣺌不知花之精鳳之靈吾亦蝶我之俱化歌樊詩之商聲賔月堂賦并序永嘉葉伯㡬士林識之西湖之上清風襲人真畏友也未㡬遂為吾州師出其翁賔月堂圖俾賦之翁既分教江西逺在千里猶覿面也其辭曰南鴈主人既堂成之夕天宇清新玊露横陳若有人兮駕言徂東徘徊斗牛歌舊雨之不來嘆浮雲之於我將有謁於主人之堂於是蜚亷揖至大夫掃門初猶讓登顔色未分乆乃拾級流光若奔主人方坐堂上仰見玊人顧而樂之罷琴與書相揖入帷作而曰靜而清黙而明不將不迎應物無形此佳賔也吾嘗遇子逝川之上不沉不浮與時俱流又嘗覿子東山之巔不磷不緇清風自怡子不我賔而賔于誰今夕何夕寜不我規賓亦從容不覺前席若有言曰吾聞皎皎者易汙盈盈者易虧潜雖伏孔之昭明吾誠也食而見更而仰過吾資也是故大白若辱愳隂滓之或來也大盈若冲信滿盛之必移也吾知吾情而已又焉以規子為主人起謝入而謀諸婦洗觥具杓與賔相屬主人起飲賔不語主人趣舞賔不傴對影成三賔不去於是歌太白之詩屬坡仙之句鸜鵒更寒天河東注主人既醉而寐賔去不顧吉祥賦有序吉祥草酷似蘭而疎秀異之海國有其種率云十嵗一花然鮮有見者余過僧智傳之室見一本紫莖而花花莖纔二寸綴花數十似瑞香而微小近玩之有香氣傳且謂余曰種且十五年矣今纔一開感係之餘賦以自廣睠靈姿之幽絶蔓天竺之化城挺纎踈之竒植負吉祥之嘉名孰北滋於下上亶見擢於衲僧方其根移露本盆壅春膏儗紫莖之呈瑞伉蘭蕙於亭臯然而朝培夕溉十有五朞春風秋露日以披滋卒深韜而重發何堅忍而舒遲諒得天之獨厚不驟悦於時宜候半世之力深迺舒英而揚竒噫嘻江路㣲暖野梅漏枝駘蕩未透宫楊既絲木俟夏而藂綠葉迎秋而飄飛含英之本麗土之枝孰不聽造兒之鼔舞候氣母之推移肯耐静於寒暑不跂榮於槁萎噫嘻甯越之學請三十年文公之伯十九載而迍邅彼長沙之誼乏寜志於初嵗玉樓之賀無静心於早慧一發洩而輙衰萬不成而敗繼余嘗感人事於河清之期悟城非於鶴歸之世三竊桃而人未知年屢變海而悵其東逝謇美草之感余起余衷之繆計尚深根以需榮倘來時之未艾諒就木之嘆婦又安能訪此花之開閉老婆牙賦并序東海有物曰老婆牙痄疨醜石掊之得膏是可怪已隑州任子為之賦曰何氣母之形幻縱造兒之􅀈􅀈探川后之珍錯得老婆之蜕牙既齱齵而􅨭􅀈亦齤􅀢而􅀈齖乍㫁槽於􅂒竹終齲笑於浪花潄嚥乎春潮呀呷乎寒沙如懐英之石露處之峰或稜層而墻壁或異宅而殊封者乎于時菜鮓逗香葛禪無句搴木頭之叢耳掇江上之破布忽真牙之墜余尚流涎之喣喣登徒齶脣之妻於是朶頥玊川赤脚之婢遂為之掩口又况青女弄嬌玊妃試手風姨窺軒月姊呈牖堆案上之黄妳篘甕中之酒母傾礰硌於寒釡堆痄疨於古缶目掄齒决搥敲石掊得金膏於沙礫吸玉液於疰朽嚥不償勞爭取恐後噫嘻悲夫蕣華之姝瓠犀鮮鮮素質化已遺􅀢豁然輔已脱而車在唇既亡而不寒豈舌柔之易毁而齒剛之反全諒堂下之乳婦宜對此而跰􅓷水仙花賦眇伊人之蟬蜕兮宅清泠以為扉越蓬隔弱窅不知其㡬千里兮跂余望之忽軒忩之翠蒨分見此綽約之芳姿曵青葱之華裾兮倚玊薤之披披逍遥清霜之夕徘徊明月之辰佩乞碧霞衣紉緑雲金杯盥雨玊盤承津􅆽和注淳斟酌天均于時庭空人静萬竅不作聲沉歩虚之歌奏杳鈞天之樂江妃具爼以進羞海若充賔而酧酢持杜觶而未揚想堂中之歡樂予亦洗盞更酌接芳㽔而為客縱歌頺然不知天河之既落庭椿賦燕山之陽南溟之濵有大木焉其名曰椿盖抗嵗時而聳立揭造化之蹲蹲者歟相彼竒亭夷庚掌平迺睠篔村甍椽列星維陋巷之蕭蕭兀幽人之柴扃有椿喬然闞乎中庭𤣥雲搆其堂宇秀色結乎軒楹觀其崇根碩本挺柯稠葉蓊蓊焉䔿䔿焉青㝠黯黯皮溜雨而胼胝幹拂霓而冗遝篲日月之氛隂控雪霜之飄颯千尋引而表端萬鳥棲而影接盖根柢之臃腫性也豈不美乎莊生之櫟枝葉之榮暢時也又何歆乎王氏之槐耶訪嵗寒之松栢盼老人之豫章或輪囷以為竒或偃蹇以為傑孰與夫却匠石而欝茀謝萬牛而崔嵬者乎爾則稚竹株連弱松肺附結緒根於地軸藉末濡於雨露想其族幹帡幪列萬間之厦屋不足以喻宗條鱗輳雖千社之枌榆又何足以同年而語耶於是天翊其貞地隆其植寒暑節其凉温鬼神呵其峻特醴泉夜注而人不能挹以草木之滋卿雲晨覆而人不能衣以青黄朱緑之絲人不足以扶持而終風不移人不足以悦懌而陽春色怡此所以俯視君遷傲睨平仲而永為斯庭之瞻依也耶彼尋常之橋梓亦何足以與乎斯石假山賦天地之間境足以移人人移之而飄忽物足以致人人或可以致物此操虵之神所以對愚公而臲􅑶也抱燃犀之餘燋覧具區於一日黯波臣之晝泣開水府之羣玊媧煉之遺禹餘之斸隕而星芒結而水沫耽枯影之申徒粲黄鉞之沉璧何其竒也爾則鐵繩十尋魚貫萬夫水厭人而不悔鞭有血兮疾驅蹲者踞者立者蹶者銛者劌者獨者附者似鼻似口似蹄似股似蟠而虬似鬭而虎雲幻状兮孤凝鳥停思兮欲翥神剜鬼削鬭面呈趺出濠濮扵華林納乾坤於一壺九華曉立五老前揖􅀈賜履之登躋養瞳神扵崒兀誰歟抱琴徙倚而吟樂山之樂萬古此心草華木滋挹其仁也霞呑霧卟擥其神也厚載靜容徳我則也霏翠排青色我覿也真趣已亡枯立堂堂子胡樂之以偽翼狂主人曰嘻不毛之珍天不怪取終日之介置我丹府誓言不移客揖而去不礙雲山堂賦他日太學陳博士為余言大夫陳次賈之賢㑹其子自録教事於鄞及交之嘗曰不礙雲山堂先人南墅翁之所築也今更深宻存先扁大愳先志之不白子其賦之其詞曰紛吾車而夙駕𣺌九軌其何之嵗冉冉而不留况秋露之夕滋弭節蒼梧之野釃酒峴山之碑羌徃迹之莫余追也靈龜誶予以啟行江妃要我以既渡櫂予舟而五覆駕陽侯之初怒洄不可以徑溯也扵是晞雷峰睋石唐領跨五花巖跪羣羊心夢夢其如醒散清飇於流矚訊厥考之初構市紛来而擊轂神黙黙以畀子閲嵗年而抱獨爾則雞犬桃源父老秦服石屋無扉䕃雲覆足朝雪溪兮濯襟夕晞髮兮溪之涔抽𤣥鑰兮參同餐神氣兮丹林囿羣山兮雙門悵白雲兮南墅傲萬物之虛舟獨翺翔乎天府嗟夫雲山之竒造物所吝訪雷澤之平蕪恫専車之後觀弔衣冠於江左之年問風流於王謝之舊想其尺烟寸雲貿貿然紅裙蠟屐之所到人不得擅而有也雖欲分樵斧之夕陽占漁郎之明月慮有徳色矣斷林火青頺垣雨黒睇猿鶴其何人載英風於上國爾乃意行莊舄之吟足重下車之揖心舒體快口靜神逸向之幽姿絶觀屈辱於牙籌金埒之家者得不獻笑而迎排青而立也扵是撫其圖而為之辭曰山之南兮有堂潄丹井兮伯陽菊之潭兮可觴溪之雪兮可湘是為羣山之囿兮以翔弔先友兮落星食舊徳兮炊香荳為萁兮田荒筆耒兮兒壃嵗将暮兮無梁豈無人兮康莊瑞粟賦翔鳯蔣東蕘家刈粟長沙塘之上得一莖七穗焉東海任士林聞而賦之曰長塘之陽維粟穰穰匪駢匪枝七穗一莖匪雨露之私匪神氣之成維君子之臧天掲之祥牝牡異宇卉蘂間芳豈不偶見妖人之狂拱桑理木岐麥穎禾世衍時成瑞出則訛今兹歉乏民蝕吏苛七穟在壠賁此坡陁悝盡地力畮益三斗穗不七兮民害以厚錯實塞下日輸百萬穗不七兮民竭飛輓蔣君之仁充然畎畆和以後兄孝以奉母日服其鎛地亦發漏百里牛肥仲尼羊茁視粟知人田父孔恱何以繪之維此有象誰與紀之竹林壤壤寳麓賦成宗皇帝臨御之明年陞奉化縣為奉化州於是始興復文公書院於寳麓之陽既成假祠吏任士林賦以落之其詞曰紛萬山而越行兮氣蜿蜒以冲融東赴海而将窮兮勢糾結以益隆又析鄞而東行兮有開元之故封出雲南之廿里兮摘青櫺於秋風斸華頂之右股兮乃益崇其西墉叱太白其逆走兮柱南山而膺空下廣衍兮為疇為丘中疏瀹兮為洄為流忽寳麓其隆起兮實枕雄乎一州喧豗於釋子之鐘鼔兮屈辱於牧豎之蓑笠又不知白雲蒼狗㡬變幻兮而春忽秋也木偃蹇其獨卧兮而秦封之不受固将叩其據於混沌也花摧折其特芳兮而移根天上之年瞭乎其猶可問也於是訪昔人之所廬兮得嘉宛之故址察鳶魚之上下兮收端倪扵天地廼薙蓬藋廼斵松梓棟突兀其凌雲兮門洞開而出日水抱曲而吞江兮玉横陳而架筆羌紫陽之舊祀兮有白鹿之初馴瞻申申之燕居兮立青青之彦俊以㳺以息以講以習時風乎其詠舞兮曰微吾其誰歸日彌髙其鑚仰兮亶卓乎其如立噫道不擇地而存兮地不擇勝而尊蹈廣大兮精微之用著宅髙明兮中庸之體具䣊従事於斯文兮其有考扵廢興之故燈花賦夫何清夜之炳炳兮吐丹艷之灼灼日抱烏而行空兮月樹桂而流魄矧膏火之自煎兮乃含華而舒萼出坎離之遘濟兮粲火棗扵尺宅返汞神扵九死兮忽金芽之中拆曰惟人事之吉兮功或成神扵龜燋主人曰吁蒸成菌樂出虛呵骨祝瓦迎鵲避烏是固率天下而途也物有儻来豈固以喜為示也事有妄意亦固以喜為戲也羌不知其故也天地汤穆兮萬物以遷人志侘傺兮日鑿其天工為商而智騖兮接為構而心然精神外薄兮物挹其先嗜欲将至兮兆扣其𤣥紛吾車而交誘兮固鬼神之所玩焉莘女入兮昌出囚越施進兮蠡具舟姜醉遣兮戈逐嬴侍巾兮夜挟輈贈予䇿兮魏譟釋予驂兮中流兆豈足以行矣機宻庸其所投竿籊籊兮車以載築登登兮象以求五羊百里一言千秋堂下鬷蔑旅中馬周允夢寐之不化燈有占兮何由至若角枕粲兮夜泣守宫殷兮臂紗濕織室兮魏俘趙近家兮代籍斬人袪兮誶謀射人釣兮縛釋将孰従而訊之抱驚魂之初惕黿鼎香兮羔美朶我頥兮動吾指食既戒兮皮冠何従酒在盛兮睨無褐之與同彼夢泣而且旦䟦或㚄而履凶府潭潭而具刑兮壇矗矗而趨縛位上卿而東市兮身四輔而仰藥九錫具兮神飛符美新兮魂索吕肉赤兮霍骨白薄氏貴兮昭誅成母尊兮王氏礫褓如意兮豕人立玉樹歌兮擒虎迫諒兆吉扵未然亦是花之所謔鄂韡韡兮誰欣終不臧兮誰虐嘆夫憂樂同域兮吉凶迭馳利害焚槐兮是非守機喜不足以徳色兮戚不足以留眉天不可以逆計兮道不可以預推適来時兮適去順亶悲欣兮目一瞬驅五歩而却止兮有千里之隂靷抱墻角之短檠兮聊以對白頭之繁燼蚯蚓賦大塊噫氣人籟比竹而善鳴者則有羣物以旁以注以胷以臆以脰以翼類不足而足也彼却行之微息示上徳於帝初進不吸風露之枝退不登鼓吹之車誤中斷於斤斸而蠕動之自如何壯聲之激發而止作之誰歟時則緑雨圍隂碧雲漏晴江月流清得意自鳴人闖之而復寂夜中分而既停何其異也予不聽之以耳而聽之以心而聽之以氣也嗟夫夫人之聲生扵所感感生所遇耳目心志其具也喜怒哀樂其樞也故發若機括振若金石感之者形開入之者心趯是以飯牛扊扅九歌五噫安知非弱䘮而不知歸者耶彼且委形扵天委和於壤聊以呻吟其天倪不足保人間之俯仰童子曰吁含化以濡不如抱枯含聲以吷不如冬結彼固妄鳴之子亦妄聽之矣松鄉集巻六
